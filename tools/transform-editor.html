<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transform Scene Editor</title>
<script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.169.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/" } }
</script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; font-family: 'Segoe UI', system-ui, sans-serif; background:#1a1a2e; color:#c8c8d8; }

#app { display:flex; flex-direction:column; height:100vh; }

/* Toolbar */
#toolbar {
  display:flex; align-items:center; gap:6px; padding:6px 12px;
  background:#0e0e1a; border-bottom:1px solid #2a2a40; min-height:42px; flex-shrink:0;
}
#toolbar button, #toolbar label {
  background:#1e1e32; border:1px solid #3a3a55; color:#c8c8d8; padding:4px 10px;
  border-radius:4px; cursor:pointer; font-size:12px; white-space:nowrap;
  transition: background 0.15s, border-color 0.15s;
}
#toolbar button:hover { background:#2a2a44; }
#toolbar button.active { background:#3355aa; border-color:#5577cc; color:#fff; }
#toolbar .sep { width:1px; height:24px; background:#3a3a55; margin:0 4px; }
#toolbar .title { font-weight:600; font-size:14px; color:#8899bb; margin-right:12px; }

/* Main area */
#main { display:flex; flex:1; overflow:hidden; }

/* Viewport */
#viewport { flex:1; position:relative; background:#09090c; }
#viewport canvas { display:block; width:100%; height:100%; }

/* Inspector */
#inspector {
  width:350px; flex-shrink:0; background:#12121e; border-left:1px solid #2a2a40;
  overflow-y:auto; overflow-x:hidden; font-size:12px;
}
#inspector::-webkit-scrollbar { width:6px; }
#inspector::-webkit-scrollbar-track { background:#12121e; }
#inspector::-webkit-scrollbar-thumb { background:#3a3a55; border-radius:3px; }

/* Object list */
#object-list {
  max-height:200px; overflow-y:auto; border-bottom:1px solid #2a2a40;
}
#object-list .list-header {
  padding:8px 12px; font-weight:600; font-size:11px; text-transform:uppercase;
  color:#6677aa; background:#0e0e1a; position:sticky; top:0; z-index:1;
}
#object-list .list-item {
  padding:4px 12px; cursor:pointer; border-bottom:1px solid #1a1a2e;
  font-size:11px; color:#8899aa; transition: background 0.1s;
}
#object-list .list-item:hover { background:#1e1e32; }
#object-list .list-item.selected { background:#2a3a5a; color:#aabbee; }
#object-list .list-item .type-badge {
  display:inline-block; font-size:9px; padding:1px 4px; border-radius:2px;
  margin-left:6px; background:#2a2a40; color:#6688aa;
}

/* Inspector sections */
.section { border-bottom:1px solid #2a2a40; }
.section-header {
  padding:8px 12px; font-weight:600; font-size:11px; text-transform:uppercase;
  color:#6677aa; background:#0e0e1a; cursor:pointer; user-select:none;
  display:flex; justify-content:space-between; align-items:center;
}
.section-header:hover { background:#151528; }
.section-header .arrow { transition: transform 0.2s; }
.section-header.collapsed .arrow { transform: rotate(-90deg); }
.section-body { padding:8px 12px; }
.section-body.hidden { display:none; }

.prop-row {
  display:flex; align-items:center; margin-bottom:5px; gap:4px;
}
.prop-label {
  width:60px; flex-shrink:0; font-size:11px; color:#7788aa;
  text-align:right; padding-right:6px;
}
.prop-label.wide { width:90px; }
.prop-input {
  flex:1; display:flex; gap:3px; align-items:center;
}
.prop-input input[type="range"] {
  flex:1; height:4px; -webkit-appearance:none; appearance:none;
  background:#2a2a40; border-radius:2px; outline:none;
}
.prop-input input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance:none; width:12px; height:12px; border-radius:50%;
  background:#5577cc; cursor:pointer;
}
.prop-input input[type="number"] {
  width:52px; background:#1a1a2e; border:1px solid #3a3a55; color:#c8c8d8;
  padding:2px 4px; border-radius:3px; font-size:11px; text-align:center;
}
.prop-input input[type="number"]:focus { border-color:#5577cc; outline:none; }
.prop-input input[type="color"] {
  width:28px; height:22px; border:1px solid #3a3a55; border-radius:3px;
  background:none; cursor:pointer; padding:0;
}
.prop-input input[type="checkbox"] { cursor:pointer; }

.xyz-row { display:flex; gap:2px; flex:1; }
.xyz-group { display:flex; align-items:center; flex:1; gap:2px; }
.xyz-label { font-size:10px; font-weight:600; width:12px; text-align:center; }
.xyz-label.x { color:#ff5555; }
.xyz-label.y { color:#55cc55; }
.xyz-label.z { color:#5588ff; }
.xyz-group input[type="number"] {
  width:100%; background:#1a1a2e; border:1px solid #3a3a55; color:#c8c8d8;
  padding:2px 3px; border-radius:3px; font-size:11px; text-align:center;
}
.xyz-group input[type="number"]:focus { border-color:#5577cc; outline:none; }

#no-selection {
  padding:40px 20px; text-align:center; color:#556677; font-size:13px;
}

/* Prompt output bar */
#prompt-bar {
  flex-shrink:0; background:#0e0e1a; border-top:1px solid #2a2a40;
  display:flex; align-items:stretch; min-height:60px; max-height:120px;
}
#prompt-output {
  flex:1; padding:8px 12px; font-family:'Fira Code', 'Consolas', monospace;
  font-size:11px; color:#88aa88; overflow-y:auto; white-space:pre-wrap;
  line-height:1.5;
}
#prompt-output::-webkit-scrollbar { width:5px; }
#prompt-output::-webkit-scrollbar-thumb { background:#3a3a55; border-radius:3px; }
#copy-btn {
  padding:8px 16px; background:#1e1e32; border:none; border-left:1px solid #2a2a40;
  color:#6688aa; cursor:pointer; font-size:11px; white-space:nowrap;
  transition: background 0.15s;
}
#copy-btn:hover { background:#2a3a5a; color:#aabbee; }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span class="title">Transform Editor</span>
    <button id="btn-move" class="active" title="Move (W)">Move</button>
    <button id="btn-rotate" title="Rotate (E)">Rotate</button>
    <button id="btn-scale" title="Scale (R)">Scale</button>
    <span class="sep"></span>
    <button id="btn-grid" title="Toggle Grid">Grid</button>
    <button id="btn-axes" title="Toggle Axes">Axes</button>
    <button id="btn-helpers" title="Toggle Light Helpers">Lights</button>
    <button id="btn-wireframe" title="Toggle Wireframe">Wire</button>
    <span class="sep"></span>
    <button id="btn-play" title="Play Animation">Play Anim</button>
    <button id="btn-reset" title="Reset Scene">Reset</button>
  </div>

  <div id="main">
    <div id="viewport"><canvas id="canvas"></canvas></div>
    <div id="inspector">
      <div id="object-list">
        <div class="list-header">Scene Objects</div>
      </div>
      <div id="inspector-content">
        <div id="no-selection">Click an object in the viewport or the list above to inspect it.</div>
      </div>
    </div>
  </div>

  <div id="prompt-bar">
    <div id="prompt-output">No changes recorded yet.</div>
    <button id="copy-btn" onclick="copyPrompt()">Copy</button>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';

// ─── Globals ───
let scene, camera, renderer, orbitControls, transformControls;
let selectedObject = null;
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const selectableMeshes = [];
const namedObjects = {};
const originalValues = {};
const changedValues = {};
const lightHelpers = [];
let gridHelper, axesHelper;
let showGrid = false, showAxes = false, showHelpers = false, wireframeOn = false;
const allMats = [], allGeos = [];
const lightProxies = new Map();
const highlightMeshes = [];

// ─── Beveled Box Geometry ───
function bevelBox(w, h, d, bevel = 0.07) {
  const shape = new THREE.Shape();
  const hw = w / 2 - bevel, hh = h / 2 - bevel;
  shape.moveTo(-hw, -h / 2);
  shape.lineTo(hw, -h / 2);
  shape.lineTo(w / 2, -hh);
  shape.lineTo(w / 2, hh);
  shape.lineTo(hw, h / 2);
  shape.lineTo(-hw, h / 2);
  shape.lineTo(-w / 2, hh);
  shape.lineTo(-w / 2, -hh);
  shape.closePath();
  const geo = new THREE.ExtrudeGeometry(shape, {
    depth: d, bevelEnabled: true,
    bevelThickness: bevel * 0.8, bevelSize: bevel * 0.8, bevelSegments: 3,
  });
  allGeos.push(geo);
  return geo;
}

// ─── Gear Geometry ───
function makeGearGeo(outerR, innerR, teeth, thickness) {
  const shape = new THREE.Shape();
  const steps = teeth * 2;
  for (let i = 0; i < steps; i++) {
    const a = (i / steps) * Math.PI * 2;
    const r = i % 2 === 0 ? outerR : innerR;
    if (i === 0) shape.moveTo(Math.cos(a) * r, Math.sin(a) * r);
    else shape.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  shape.closePath();
  const hole = new THREE.Path();
  for (let i = 0; i < 16; i++) {
    const a = (i / 16) * Math.PI * 2;
    if (i === 0) hole.moveTo(Math.cos(a) * innerR * 0.35, Math.sin(a) * innerR * 0.35);
    else hole.lineTo(Math.cos(a) * innerR * 0.35, Math.sin(a) * innerR * 0.35);
  }
  shape.holes.push(hole);
  const geo = new THREE.ExtrudeGeometry(shape, {
    depth: thickness, bevelEnabled: true,
    bevelThickness: 0.012, bevelSize: 0.012, bevelSegments: 2,
  });
  allGeos.push(geo);
  return geo;
}

// ─── Greeble Strips ───
function addGreebleStrip(parent, x, y, z, length, vertical, mat, namePrefix) {
  const count = Math.floor(length / 0.25);
  const grp = new THREE.Group();
  grp.name = namePrefix;
  for (let i = 0; i < count; i++) {
    const type = Math.random();
    let geo;
    if (type < 0.3) geo = new THREE.CylinderGeometry(0.035, 0.035, 0.05, 6);
    else if (type < 0.6) geo = new THREE.BoxGeometry(0.12, 0.04, 0.04);
    else if (type < 0.8) geo = new THREE.CylinderGeometry(0.02, 0.02, 0.15, 6);
    else geo = new THREE.SphereGeometry(0.025, 6, 4);
    allGeos.push(geo);
    const mesh = new THREE.Mesh(geo, mat);
    const offset = -length / 2 + (i + 0.5) * (length / count);
    if (vertical) {
      mesh.position.set(x, y + offset, z);
      if (type >= 0.6 && type < 0.8) mesh.rotation.z = Math.PI / 2;
    } else {
      mesh.position.set(x + offset, y, z);
    }
    if (type < 0.3) mesh.rotation.x = Math.PI / 2;
    grp.add(mesh);
  }
  parent.add(grp);
  registerObject(grp, namePrefix);
  return grp;
}

// ─── Texture Loading ───
const loader = new THREE.TextureLoader();
function loadTex(path, repeatX = 1, repeatY = 1) {
  const tex = loader.load(path, undefined, undefined, () => {});
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.repeat.set(repeatX, repeatY);
  return tex;
}

// ─── Register objects for selection ───
function registerObject(obj, name) {
  obj.name = name;
  namedObjects[name] = obj;
  originalValues[name] = {
    pos: obj.position.clone(),
    rot: obj.rotation.clone(),
    scale: obj.scale.clone(),
  };
  if (obj.isMesh && obj.material) {
    const m = obj.material;
    const matOrig = {};
    if (m.color) matOrig.color = '#' + m.color.getHexString();
    if (m.metalness !== undefined) matOrig.metalness = m.metalness;
    if (m.roughness !== undefined) matOrig.roughness = m.roughness;
    if (m.clearcoat !== undefined) matOrig.clearcoat = m.clearcoat;
    if (m.emissive) matOrig.emissiveColor = '#' + m.emissive.getHexString();
    if (m.emissiveIntensity !== undefined) matOrig.emissiveIntensity = m.emissiveIntensity;
    if (m.opacity !== undefined) matOrig.opacity = m.opacity;
    if (m.normalScale) matOrig.normalScaleX = m.normalScale.x;
    if (m.map) {
      matOrig.tilingX = m.map.repeat.x;
      matOrig.tilingY = m.map.repeat.y;
      matOrig.offsetX = m.map.offset.x;
      matOrig.offsetY = m.map.offset.y;
      matOrig.texRotation = m.map.rotation;
    }
    originalValues[name].mat = matOrig;
  }
  if (obj.isMesh) {
    selectableMeshes.push(obj);
  } else if (obj.isGroup) {
    obj.traverse(child => {
      if (child.isMesh) selectableMeshes.push(child);
    });
  }
}

function registerLight(light, name, proxyMesh) {
  light.name = name;
  namedObjects[name] = light;
  lightProxies.set(proxyMesh, light);
  selectableMeshes.push(proxyMesh);
  originalValues[name] = {
    pos: light.position.clone(),
    lightColor: '#' + light.color.getHexString(),
    lightIntensity: light.intensity,
  };
  if (light.isPointLight) {
    originalValues[name].distance = light.distance;
    originalValues[name].decay = light.decay;
  }
}

// ─── Init Scene ───
function init() {
  const canvas = document.getElementById('canvas');
  const container = document.getElementById('viewport');

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.95;
  resize();

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x09090c);

  camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
  camera.position.set(0, 0, 11.5);

  // Environment
  const pmrem = new THREE.PMREMGenerator(renderer);
  const envS = new THREE.Scene();
  envS.add(new THREE.HemisphereLight(0x7799cc, 0x443322, 3.5));
  const ep1 = new THREE.PointLight(0xff4400, 2, 30); ep1.position.set(8, 5, 8); envS.add(ep1);
  const ep2 = new THREE.PointLight(0x0044cc, 1.5, 30); ep2.position.set(-8, -3, 8); envS.add(ep2);
  scene.environment = pmrem.fromScene(envS, 0.04).texture;
  pmrem.dispose();

  // Controls
  orbitControls = new OrbitControls(camera, canvas);
  orbitControls.enableDamping = true;
  orbitControls.dampingFactor = 0.08;

  transformControls = new TransformControls(camera, canvas);
  transformControls.addEventListener('dragging-changed', e => {
    orbitControls.enabled = !e.value;
  });
  transformControls.addEventListener('objectChange', () => {
    if (selectedObject) {
      updateInspectorFromObject();
      recordChange(selectedObject);
    }
  });
  scene.add(transformControls.getHelper());

  // Grid + Axes
  gridHelper = new THREE.GridHelper(20, 40, 0x333355, 0x222244);
  gridHelper.visible = showGrid;
  scene.add(gridHelper);

  axesHelper = new THREE.AxesHelper(5);
  axesHelper.visible = showAxes;
  scene.add(axesHelper);

  // ─── Textures ───
  const texBase = '../public/textures/';
  const redTex = loadTex(texBase + 'red-metal.jpg', 0.09, 0.25);
  redTex.offset.set(0, 0.26);
  const blueTex = loadTex(texBase + 'blue-metal.jpg', 0.56, 0.29);
  const darkTex = loadTex(texBase + 'dark-metal.jpg', 0.45, 0.55);

  let redNorm, blueNorm, greebleNorm;
  try {
    redNorm = loadTex(texBase + 'red-normal.jpg', 0.09, 0.25);
    redNorm.offset.set(0, 0.26);
    blueNorm = loadTex(texBase + 'blue-normal.jpg', 0.56, 0.29);
    greebleNorm = loadTex(texBase + 'greeble-normal.jpg', 0.45, 0.55);
  } catch(e) {}

  // ─── Materials ───
  const crimson = new THREE.MeshPhysicalMaterial({
    color: 0xca2f47, map: redTex, normalMap: redNorm || null,
    normalScale: new THREE.Vector2(0.4, 0.4),
    metalness: 0.34, roughness: 0.37, clearcoat: 0.19, clearcoatRoughness: 0.06,
  });
  const navy = new THREE.MeshPhysicalMaterial({
    color: 0x2a3090, map: blueTex, normalMap: blueNorm || null,
    normalScale: new THREE.Vector2(0.7, 0.7),
    metalness: 0.45, roughness: 0.31, clearcoat: 0.5, clearcoatRoughness: 0.08,
  });
  const gunmetal = new THREE.MeshPhysicalMaterial({
    color: 0x2a2a38, map: darkTex, normalMap: greebleNorm || null,
    normalScale: new THREE.Vector2(0.3, 0.3),
    metalness: 0.89, roughness: 0.29, clearcoat: 0.3,
  });
  const chrome = new THREE.MeshPhysicalMaterial({
    color: 0xbbbbcc, metalness: 1.0, roughness: 0.03, clearcoat: 1.0, clearcoatRoughness: 0.01,
  });
  const steel = new THREE.MeshPhysicalMaterial({
    color: 0x607080, metalness: 0.95, roughness: 0.1, clearcoat: 0.4,
  });
  const greebMat = new THREE.MeshPhysicalMaterial({
    color: 0x444455, metalness: 0.9, roughness: 0.15, clearcoat: 0.3,
  });
  const ledGlow = new THREE.MeshBasicMaterial({ color: 0x22aaff, transparent: true, opacity: 0.78 });
  const orangeGlow = new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.8 });

  allMats.push(crimson, navy, gunmetal, chrome, steel, greebMat, ledGlow, orangeGlow);

  // ─── Dimensions ───
  const frameW = 7.5, frameH = 4.6, barW = 0.4, barD = 0.45;

  function centerGeo(geo) {
    geo.computeBoundingBox();
    const bb = geo.boundingBox;
    geo.translate(-(bb.max.x + bb.min.x) / 2, -(bb.max.y + bb.min.y) / 2, -(bb.max.z + bb.min.z) / 2);
    return geo;
  }

  // ─── Frame Bars (Final assembled state) ───
  const topBar = new THREE.Mesh(centerGeo(bevelBox(frameW, barW, barD, 0.08)), crimson);
  topBar.position.set(0, frameH / 2 - barW / 2, 0);
  scene.add(topBar);
  registerObject(topBar, 'TopBar');

  const bottomBar = new THREE.Mesh(centerGeo(bevelBox(frameW, barW, barD, 0.08)), crimson);
  bottomBar.position.set(0, -frameH / 2 + barW / 2, 0);
  scene.add(bottomBar);
  registerObject(bottomBar, 'BottomBar');

  const leftBar = new THREE.Mesh(centerGeo(bevelBox(barW, frameH - barW * 2, barD, 0.08)), navy);
  leftBar.position.set(-frameW / 2 + barW / 2, 0, 0);
  scene.add(leftBar);
  registerObject(leftBar, 'LeftBar');

  const rightBar = new THREE.Mesh(centerGeo(bevelBox(barW, frameH - barW * 2, barD, 0.08)), navy);
  rightBar.position.set(frameW / 2 - barW / 2, 0, 0);
  scene.add(rightBar);
  registerObject(rightBar, 'RightBar');

  const backPanel = new THREE.Mesh(centerGeo(bevelBox(frameW - barW * 2, frameH - barW * 2, 0.1, 0.04)), gunmetal);
  backPanel.position.set(0, 0, -barD * 0.5);
  scene.add(backPanel);
  registerObject(backPanel, 'BackPanel');

  // ─── Greeble Strips ───
  addGreebleStrip(scene, 0, frameH / 2 - barW / 2, barD / 2 + 0.03, frameW * 0.6, false, greebMat, 'Greeble-Top');
  addGreebleStrip(scene, 0, -frameH / 2 + barW / 2, barD / 2 + 0.03, frameW * 0.6, false, greebMat, 'Greeble-Bottom');
  addGreebleStrip(scene, -frameW / 2 + barW / 2, 0, barD / 2 + 0.03, (frameH - barW * 2) * 0.6, true, greebMat, 'Greeble-Left');
  addGreebleStrip(scene, frameW / 2 - barW / 2, 0, barD / 2 + 0.03, (frameH - barW * 2) * 0.6, true, greebMat, 'Greeble-Right');

  // ─── Corner Brackets ───
  const brkSize = 0.6;
  const bracketData = [
    { name: 'Bracket-TL', ex: -frameW / 2 + brkSize / 2, ey: frameH / 2 - brkSize / 2 },
    { name: 'Bracket-TR', ex: frameW / 2 - brkSize / 2, ey: frameH / 2 - brkSize / 2 },
    { name: 'Bracket-BL', ex: -frameW / 2 + brkSize / 2, ey: -frameH / 2 + brkSize / 2 },
    { name: 'Bracket-BR', ex: frameW / 2 - brkSize / 2, ey: -frameH / 2 + brkSize / 2 },
  ];
  bracketData.forEach(({ name, ex, ey }) => {
    const grp = new THREE.Group();
    const hGeo = bevelBox(brkSize, 0.18, barD * 0.85, 0.05);
    const hMesh = new THREE.Mesh(hGeo, crimson);
    hMesh.position.y = brkSize / 2 - 0.09;
    grp.add(hMesh);
    const vGeo = bevelBox(0.18, brkSize, barD * 0.85, 0.05);
    const vMesh = new THREE.Mesh(vGeo, crimson);
    vMesh.position.x = -brkSize / 2 + 0.09;
    grp.add(vMesh);
    grp.position.set(ex, ey, barD / 2);
    scene.add(grp);
    registerObject(grp, name);
  });

  // ─── Bolts ───
  const boltGeo = new THREE.CylinderGeometry(0.07, 0.07, 0.22, 8);
  allGeos.push(boltGeo);
  const boltPositions = [
    { name: 'Bolt-1', x: -frameW * 0.35, y: frameH / 2 - barW / 2 },
    { name: 'Bolt-2', x: frameW * 0.35, y: frameH / 2 - barW / 2 },
    { name: 'Bolt-3', x: -frameW * 0.35, y: -frameH / 2 + barW / 2 },
    { name: 'Bolt-4', x: frameW * 0.35, y: -frameH / 2 + barW / 2 },
    { name: 'Bolt-5', x: 0, y: frameH / 2 - barW / 2 },
    { name: 'Bolt-6', x: 0, y: -frameH / 2 + barW / 2 },
    { name: 'Bolt-7', x: -frameW / 2 + barW / 2, y: 0 },
    { name: 'Bolt-8', x: frameW / 2 - barW / 2, y: 0 },
  ];
  boltPositions.forEach(({ name, x, y }) => {
    const bolt = new THREE.Mesh(boltGeo, chrome);
    bolt.position.set(x, y, barD / 2 + 0.12);
    bolt.rotation.x = Math.PI / 2;
    scene.add(bolt);
    registerObject(bolt, name);
  });

  // ─── Gears ───
  const gearPositions = [
    { name: 'Gear-TL', x: -frameW / 2 + 0.1, y: frameH / 2 - 0.1, r: 0.25, t: 12, spd: 1.2 },
    { name: 'Gear-TR', x: frameW / 2 - 0.1, y: frameH / 2 - 0.1, r: 0.2, t: 10, spd: -1.8 },
    { name: 'Gear-BL', x: -frameW / 2 + 0.1, y: -frameH / 2 + 0.1, r: 0.2, t: 10, spd: -1.5 },
    { name: 'Gear-BR', x: frameW / 2 - 0.1, y: -frameH / 2 + 0.1, r: 0.25, t: 12, spd: 1.3 },
  ];
  const gears = gearPositions.map(({ name, x, y, r, t, spd }) => {
    const geo = makeGearGeo(r, r * 0.72, t, 0.12);
    const mesh = new THREE.Mesh(geo, steel);
    mesh.position.set(x, y, barD / 2 + 0.07);
    scene.add(mesh);
    registerObject(mesh, name);
    return { mesh, speed: spd };
  });

  // ─── Pistons ───
  const pistonGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.6, 8);
  allGeos.push(pistonGeo);
  const pistonData = [
    { name: 'Piston-L', x: -frameW / 2 + barW + 0.1, baseY: 0.7 },
    { name: 'Piston-R', x: frameW / 2 - barW - 0.1, baseY: -0.7 },
  ];
  const pistons = pistonData.map(({ name, x, baseY }) => {
    const m = new THREE.Mesh(pistonGeo, chrome);
    m.position.set(x, baseY, barD / 2 + 0.04);
    scene.add(m);
    registerObject(m, name);
    return { mesh: m, baseY };
  });

  // ─── LED Glow Strips ───
  const glowData = [
    { name: 'LED-Top', x: 0, y: frameH / 2 - barW / 2, w: frameW * 0.85, h: 0.1 },
    { name: 'LED-Bottom', x: 0, y: -frameH / 2 + barW / 2, w: frameW * 0.85, h: 0.1 },
    { name: 'LED-Left', x: -frameW / 2 + barW / 2, y: 0, w: 0.1, h: (frameH - barW * 2) * 0.85 },
    { name: 'LED-Right', x: frameW / 2 - barW / 2, y: 0, w: 0.1, h: (frameH - barW * 2) * 0.85 },
  ];
  glowData.forEach(({ name, x, y, w, h }) => {
    const g = new THREE.BoxGeometry(w, h, 0.04); allGeos.push(g);
    const m = ledGlow.clone(); allMats.push(m);
    const mesh = new THREE.Mesh(g, m);
    mesh.position.set(x, y, barD / 2 + 0.06);
    scene.add(mesh);
    registerObject(mesh, name);
  });

  // ─── Orange Accent Strips ───
  const orangeData = [
    { name: 'Orange-LUp', x: -frameW / 2 + barW / 2, y: 0.8, w: 0.06, h: 0.5 },
    { name: 'Orange-LDown', x: -frameW / 2 + barW / 2, y: -0.8, w: 0.06, h: 0.5 },
    { name: 'Orange-RUp', x: frameW / 2 - barW / 2, y: 0.8, w: 0.06, h: 0.5 },
    { name: 'Orange-RDown', x: frameW / 2 - barW / 2, y: -0.8, w: 0.06, h: 0.5 },
  ];
  orangeData.forEach(({ name, x, y, w, h }) => {
    const g = new THREE.BoxGeometry(w, h, 0.04); allGeos.push(g);
    const m = orangeGlow.clone(); allMats.push(m);
    const mesh = new THREE.Mesh(g, m);
    mesh.position.set(x, y, barD / 2 + 0.06);
    scene.add(mesh);
    registerObject(mesh, name);
  });

  // ─── Lights ───
  scene.add(new THREE.AmbientLight(0x555566, 0.01));

  const keyDir = new THREE.DirectionalLight(0xffeedd, 3.6);
  keyDir.position.set(-1.3, 3.1, -2.7);
  scene.add(keyDir);
  registerLight(keyDir, 'Light-Key', makeLightProxy(keyDir, 0xffeedd));

  const fillDir = new THREE.DirectionalLight(0x3355aa, 1.2);
  fillDir.position.set(0.7, 1.3, -12.6);
  scene.add(fillDir);
  registerLight(fillDir, 'Light-Fill', makeLightProxy(fillDir, 0x3355aa));

  const rimDir = new THREE.DirectionalLight(0xff6633, 2.3);
  rimDir.position.set(-5.4, -5.9, -15.0);
  scene.add(rimDir);
  registerLight(rimDir, 'Light-Rim', makeLightProxy(rimDir, 0xff6633));

  const orb1 = new THREE.PointLight(0xff3300, 0.7, 30);
  orb1.position.set(7.8, -4.5, 13.8);
  scene.add(orb1);
  registerLight(orb1, 'Light-Orb1', makeLightProxy(orb1, 0xff3300));

  const orb2 = new THREE.PointLight(0x3700ff, 4.8, 30);
  orb2.position.set(-3.7, -2.2, -0.2);
  scene.add(orb2);
  registerLight(orb2, 'Light-Orb2', makeLightProxy(orb2, 0x3700ff));

  // Light helpers (initially hidden)
  [
    new THREE.DirectionalLightHelper(keyDir, 0.5),
    new THREE.DirectionalLightHelper(fillDir, 0.5),
    new THREE.DirectionalLightHelper(rimDir, 0.5),
    new THREE.PointLightHelper(orb1, 0.3),
    new THREE.PointLightHelper(orb2, 0.3),
  ].forEach(h => { h.visible = false; scene.add(h); lightHelpers.push(h); });

  buildObjectList();

  // ─── Animation Loop ───
  let time = 0;
  function animate() {
    requestAnimationFrame(animate);
    time += 0.016;
    gears.forEach(({ mesh, speed }) => { mesh.rotation.z += speed * 0.016; });
    pistons.forEach(({ mesh, baseY }, i) => {
      mesh.position.y = baseY + Math.sin(time * 1.8 + i * Math.PI) * 0.15;
    });
    // Sync highlight meshes
    highlightMeshes.forEach(({ wire, source }) => {
      wire.position.copy(source.position);
      wire.rotation.copy(source.rotation);
      wire.scale.copy(source.scale);
    });
    // Sync light proxies
    lightProxies.forEach((light, proxy) => { proxy.position.copy(light.position); });
    orbitControls.update();
    lightHelpers.forEach(h => { if (h.visible) h.update(); });
    renderer.render(scene, camera);
  }
  animate();

  // ─── Events ───
  canvas.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('resize', resize);
  window.addEventListener('keydown', onKeyDown);

  document.getElementById('btn-move').addEventListener('click', () => setTransformMode('translate'));
  document.getElementById('btn-rotate').addEventListener('click', () => setTransformMode('rotate'));
  document.getElementById('btn-scale').addEventListener('click', () => setTransformMode('scale'));
  document.getElementById('btn-grid').addEventListener('click', toggleGrid);
  document.getElementById('btn-axes').addEventListener('click', toggleAxes);
  document.getElementById('btn-helpers').addEventListener('click', toggleHelpers);
  document.getElementById('btn-wireframe').addEventListener('click', toggleWireframe);
  document.getElementById('btn-play').addEventListener('click', playAnimation);
  document.getElementById('btn-reset').addEventListener('click', resetScene);
}

function makeLightProxy(light, color) {
  const geo = new THREE.SphereGeometry(0.15, 8, 6); allGeos.push(geo);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.6, depthTest: false });
  allMats.push(mat);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(light.position);
  mesh.renderOrder = 999;
  mesh.visible = false; // hidden until Lights toggle
  scene.add(mesh);
  return mesh;
}

function resize() {
  const container = document.getElementById('viewport');
  const w = container.clientWidth, h = container.clientHeight;
  if (renderer) { renderer.setSize(w, h); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); }
  if (camera) { camera.aspect = w / h; camera.updateProjectionMatrix(); }
}

// ─── Pointer / Selection ───
const pointerDownPos = new THREE.Vector2();
function onPointerDown(e) {
  pointerDownPos.set(e.clientX, e.clientY);
  const canvas = document.getElementById('canvas');
  const handler = (e2) => {
    canvas.removeEventListener('pointerup', handler);
    const dx = e2.clientX - pointerDownPos.x, dy = e2.clientY - pointerDownPos.y;
    if (Math.sqrt(dx*dx + dy*dy) < 5) onClick(e2);
  };
  canvas.addEventListener('pointerup', handler);
}

function onClick(e) {
  const container = document.getElementById('viewport');
  const rect = container.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  // Skip TransformControls gizmo clicks
  const tcIntersects = raycaster.intersectObject(transformControls.getHelper(), true);
  if (tcIntersects.length > 0) return;

  const intersects = raycaster.intersectObjects(selectableMeshes, false);
  if (intersects.length > 0) {
    let hitMesh = intersects[0].object;
    // Skip highlight meshes
    if (hitMesh.userData._isHighlight) {
      const filtered = intersects.filter(i => !i.object.userData._isHighlight);
      if (filtered.length === 0) return;
      hitMesh = filtered[0].object;
    }
    if (lightProxies.has(hitMesh)) { selectObject(lightProxies.get(hitMesh)); return; }
    const target = findNamedParent(hitMesh);
    selectObject(target || hitMesh);
  } else {
    deselectObject();
  }
}

function findNamedParent(mesh) {
  let obj = mesh;
  while (obj) {
    if (obj.name && namedObjects[obj.name]) return obj;
    obj = obj.parent;
    if (obj === scene) break;
  }
  return null;
}

function selectObject(obj) {
  deselectObject();
  selectedObject = obj;

  if (obj.isMesh) addHighlight(obj);
  else if (obj.isGroup) obj.traverse(child => { if (child.isMesh) addHighlight(child); });

  transformControls.attach(obj);

  document.querySelectorAll('.list-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.name === obj.name);
  });
  // Scroll selected item into view
  const selItem = document.querySelector(`.list-item[data-name="${obj.name}"]`);
  if (selItem) selItem.scrollIntoView({ block: 'nearest' });

  buildInspector(obj);
}

function deselectObject() {
  removeHighlight();
  transformControls.detach();
  selectedObject = null;
  document.querySelectorAll('.list-item').forEach(el => el.classList.remove('selected'));
  document.getElementById('inspector-content').innerHTML =
    '<div id="no-selection">Click an object in the viewport or the list above to inspect it.</div>';
}

function addHighlight(mesh) {
  const geo = mesh.geometry;
  if (!geo) return;
  const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.35, depthTest: false });
  allMats.push(mat);
  const wire = new THREE.Mesh(geo, mat);
  wire.position.copy(mesh.position);
  wire.rotation.copy(mesh.rotation);
  wire.scale.copy(mesh.scale);
  wire.renderOrder = 998;
  wire.userData._isHighlight = true;
  (mesh.parent || scene).add(wire);
  highlightMeshes.push({ wire, source: mesh });
}

function removeHighlight() {
  highlightMeshes.forEach(({ wire }) => {
    if (wire.parent) wire.parent.remove(wire);
    wire.material.dispose();
  });
  highlightMeshes.length = 0;
}

// ─── Object List ───
function buildObjectList() {
  const list = document.getElementById('object-list');
  const headerHTML = '<div class="list-header">Scene Objects</div>';
  list.innerHTML = headerHTML;
  Object.keys(namedObjects).forEach(name => {
    const obj = namedObjects[name];
    const item = document.createElement('div');
    item.className = 'list-item';
    item.dataset.name = name;
    let typeBadge = 'mesh';
    if (obj.isLight) typeBadge = obj.isPointLight ? 'point' : 'dir';
    else if (obj.isGroup) typeBadge = 'group';
    item.innerHTML = `${name}<span class="type-badge">${typeBadge}</span>`;
    item.addEventListener('click', () => selectObject(obj));
    list.appendChild(item);
  });
}

// ─── Inspector Builder ───
function buildInspector(obj) {
  const content = document.getElementById('inspector-content');
  content.innerHTML = '';
  const isLight = obj.isLight;

  // Transform
  content.appendChild(makeSection('Transform', () => {
    const body = document.createElement('div');
    body.appendChild(makeXYZRow('Position', obj.position, 'pos', -20, 20, 0.01));
    body.appendChild(makeRotationRow('Rotation', obj.rotation));
    if (!isLight) body.appendChild(makeXYZRow('Scale', obj.scale, 'scale', 0.01, 10, 0.01));
    return body;
  }));

  // Light
  if (isLight) {
    content.appendChild(makeSection('Light', () => {
      const body = document.createElement('div');
      const typeRow = document.createElement('div');
      typeRow.className = 'prop-row';
      typeRow.innerHTML = `<span class="prop-label">Type</span><span style="color:#aabbcc">${obj.isPointLight ? 'PointLight' : 'DirectionalLight'}</span>`;
      body.appendChild(typeRow);
      body.appendChild(makeColorRow('Color', obj.color, c => { obj.color.set(c); recordChange(obj); }));
      body.appendChild(makeSliderRow('Intensity', obj.intensity, 0, 10, 0.01, v => { obj.intensity = v; recordChange(obj); }));
      if (obj.isPointLight) {
        body.appendChild(makeSliderRow('Distance', obj.distance, 0, 100, 0.1, v => { obj.distance = v; recordChange(obj); }));
        body.appendChild(makeSliderRow('Decay', obj.decay, 0, 5, 0.01, v => { obj.decay = v; recordChange(obj); }));
      }
      return body;
    }));
  }

  // Material
  let mat = null;
  if (obj.isMesh && obj.material) mat = obj.material;
  else if (obj.isGroup) obj.traverse(c => { if (!mat && c.isMesh && c.material) mat = c.material; });

  if (mat && (mat.isMeshPhysicalMaterial || mat.isMeshBasicMaterial)) {
    content.appendChild(makeSection('Material', () => {
      const body = document.createElement('div');
      if (mat.color) body.appendChild(makeColorRow('Color', mat.color, c => { mat.color.set(c); recordChange(obj); }));
      if (mat.metalness !== undefined) body.appendChild(makeSliderRow('Metalness', mat.metalness, 0, 1, 0.01, v => { mat.metalness = v; recordChange(obj); }));
      if (mat.roughness !== undefined) body.appendChild(makeSliderRow('Roughness', mat.roughness, 0, 1, 0.01, v => { mat.roughness = v; recordChange(obj); }));
      if (mat.clearcoat !== undefined) body.appendChild(makeSliderRow('Clearcoat', mat.clearcoat, 0, 1, 0.01, v => { mat.clearcoat = v; recordChange(obj); }));
      if (mat.emissive) {
        body.appendChild(makeColorRow('Emissive', mat.emissive, c => { mat.emissive.set(c); recordChange(obj); }));
        body.appendChild(makeSliderRow('Emiss.Int', mat.emissiveIntensity || 0, 0, 5, 0.01, v => { mat.emissiveIntensity = v; recordChange(obj); }));
      }
      if (mat.opacity !== undefined) body.appendChild(makeSliderRow('Opacity', mat.opacity, 0, 1, 0.01, v => { mat.opacity = v; recordChange(obj); }));
      if (mat.normalScale) body.appendChild(makeSliderRow('NormScale', mat.normalScale.x, 0, 3, 0.01, v => { mat.normalScale.set(v, v); recordChange(obj); }));
      return body;
    }));

    // Texture
    if (mat.map) {
      content.appendChild(makeSection('Texture', () => {
        const body = document.createElement('div');
        const tex = mat.map;
        body.appendChild(makeSliderRow('Tiling X', tex.repeat.x, 0.01, 5, 0.01, v => { tex.repeat.x = v; recordChange(obj); }));
        body.appendChild(makeSliderRow('Tiling Y', tex.repeat.y, 0.01, 5, 0.01, v => { tex.repeat.y = v; recordChange(obj); }));
        body.appendChild(makeSliderRow('Offset X', tex.offset.x, 0, 1, 0.01, v => { tex.offset.x = v; recordChange(obj); }));
        body.appendChild(makeSliderRow('Offset Y', tex.offset.y, 0, 1, 0.01, v => { tex.offset.y = v; recordChange(obj); }));
        body.appendChild(makeSliderRow('Rotation', THREE.MathUtils.radToDeg(tex.rotation), 0, 360, 1, v => { tex.rotation = THREE.MathUtils.degToRad(v); recordChange(obj); }));
        // Enable toggle
        const toggleRow = document.createElement('div');
        toggleRow.className = 'prop-row';
        toggleRow.innerHTML = '<span class="prop-label wide">Enabled</span>';
        const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = true;
        cb.addEventListener('change', () => {
          if (!cb.checked) { mat.userData._savedMap = mat.map; mat.map = null; }
          else if (mat.userData._savedMap) mat.map = mat.userData._savedMap;
          mat.needsUpdate = true; recordChange(obj);
        });
        toggleRow.appendChild(cb); body.appendChild(toggleRow);
        return body;
      }));
    }
  }
}

// ─── UI Helpers ───
function makeSection(title, buildBody) {
  const section = document.createElement('div');
  section.className = 'section';
  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = `<span>${title}</span><span class="arrow">&#9660;</span>`;
  const bodyWrapper = document.createElement('div');
  bodyWrapper.className = 'section-body';
  bodyWrapper.appendChild(buildBody());
  header.addEventListener('click', () => {
    header.classList.toggle('collapsed');
    bodyWrapper.classList.toggle('hidden');
  });
  section.appendChild(header);
  section.appendChild(bodyWrapper);
  return section;
}

function makeXYZRow(label, vec, type, min, max, step) {
  const row = document.createElement('div');
  row.className = 'prop-row';
  row.innerHTML = `<span class="prop-label">${label}</span>`;
  const xyz = document.createElement('div');
  xyz.className = 'xyz-row';
  ['x', 'y', 'z'].forEach(axis => {
    const grp = document.createElement('div');
    grp.className = 'xyz-group';
    grp.innerHTML = `<span class="xyz-label ${axis}">${axis.toUpperCase()}</span>`;
    const inp = document.createElement('input');
    inp.type = 'number'; inp.step = step; inp.min = min; inp.max = max;
    inp.value = parseFloat(vec[axis].toFixed(4));
    inp.dataset.axis = axis; inp.dataset.type = type;
    inp.addEventListener('input', () => { vec[axis] = parseFloat(inp.value) || 0; recordChange(selectedObject); });
    grp.appendChild(inp); xyz.appendChild(grp);
  });
  row.appendChild(xyz);
  return row;
}

function makeRotationRow(label, euler) {
  const row = document.createElement('div');
  row.className = 'prop-row';
  row.innerHTML = `<span class="prop-label">${label}</span>`;
  const xyz = document.createElement('div');
  xyz.className = 'xyz-row';
  ['x', 'y', 'z'].forEach(axis => {
    const grp = document.createElement('div');
    grp.className = 'xyz-group';
    grp.innerHTML = `<span class="xyz-label ${axis}">${axis.toUpperCase()}</span>`;
    const inp = document.createElement('input');
    inp.type = 'number'; inp.step = 0.5; inp.min = -360; inp.max = 360;
    inp.value = parseFloat(THREE.MathUtils.radToDeg(euler[axis]).toFixed(2));
    inp.dataset.axis = axis; inp.dataset.type = 'rot';
    inp.addEventListener('input', () => { euler[axis] = THREE.MathUtils.degToRad(parseFloat(inp.value) || 0); recordChange(selectedObject); });
    grp.appendChild(inp); xyz.appendChild(grp);
  });
  row.appendChild(xyz);
  return row;
}

function makeSliderRow(label, value, min, max, step, onChange) {
  const row = document.createElement('div');
  row.className = 'prop-row';
  row.innerHTML = `<span class="prop-label wide">${label}</span>`;
  const inputDiv = document.createElement('div');
  inputDiv.className = 'prop-input';
  const slider = document.createElement('input');
  slider.type = 'range'; slider.min = min; slider.max = max; slider.step = step; slider.value = value;
  const num = document.createElement('input');
  num.type = 'number'; num.min = min; num.max = max; num.step = step; num.value = parseFloat(Number(value).toFixed(4));
  slider.addEventListener('input', () => { num.value = parseFloat(slider.value).toFixed(4); onChange(parseFloat(slider.value)); });
  num.addEventListener('input', () => { slider.value = num.value; onChange(parseFloat(num.value) || 0); });
  inputDiv.appendChild(slider); inputDiv.appendChild(num);
  row.appendChild(inputDiv);
  return row;
}

function makeColorRow(label, colorObj, onChange) {
  const row = document.createElement('div');
  row.className = 'prop-row';
  row.innerHTML = `<span class="prop-label wide">${label}</span>`;
  const inputDiv = document.createElement('div');
  inputDiv.className = 'prop-input';
  const picker = document.createElement('input');
  picker.type = 'color'; picker.value = '#' + colorObj.getHexString();
  const hex = document.createElement('input');
  hex.type = 'text'; hex.value = '#' + colorObj.getHexString();
  hex.style.cssText = 'width:70px;background:#1a1a2e;border:1px solid #3a3a55;color:#c8c8d8;padding:2px 4px;border-radius:3px;font-size:11px;';
  picker.addEventListener('input', () => { hex.value = picker.value; onChange(picker.value); });
  hex.addEventListener('input', () => { if (/^#[0-9a-f]{6}$/i.test(hex.value)) { picker.value = hex.value; onChange(hex.value); } });
  inputDiv.appendChild(picker); inputDiv.appendChild(hex);
  row.appendChild(inputDiv);
  return row;
}

function updateInspectorFromObject() {
  if (!selectedObject) return;
  document.querySelectorAll('#inspector-content input[data-type]').forEach(inp => {
    const type = inp.dataset.type, axis = inp.dataset.axis;
    if (type === 'pos') inp.value = parseFloat(selectedObject.position[axis].toFixed(4));
    else if (type === 'rot') inp.value = parseFloat(THREE.MathUtils.radToDeg(selectedObject.rotation[axis]).toFixed(2));
    else if (type === 'scale') inp.value = parseFloat(selectedObject.scale[axis].toFixed(4));
  });
}

// ─── Change Recording ───
function recordChange(obj) {
  if (!obj || !obj.name) return;
  const orig = originalValues[obj.name];
  if (!orig) return;
  const changes = {};
  const p = obj.position, op = orig.pos;
  if (op && (Math.abs(p.x - op.x) > 0.001 || Math.abs(p.y - op.y) > 0.001 || Math.abs(p.z - op.z) > 0.001))
    changes.position = `${p.x.toFixed(3)}, ${p.y.toFixed(3)}, ${p.z.toFixed(3)}`;
  if (!obj.isLight) {
    const r = obj.rotation, or = orig.rot;
    if (or && (Math.abs(r.x - or.x) > 0.001 || Math.abs(r.y - or.y) > 0.001 || Math.abs(r.z - or.z) > 0.001))
      changes.rotation = `${r.x.toFixed(4)}, ${r.y.toFixed(4)}, ${r.z.toFixed(4)}`;
    const s = obj.scale, os = orig.scale;
    if (os && (Math.abs(s.x - os.x) > 0.001 || Math.abs(s.y - os.y) > 0.001 || Math.abs(s.z - os.z) > 0.001))
      changes.scale = `${s.x.toFixed(3)}, ${s.y.toFixed(3)}, ${s.z.toFixed(3)}`;
  }
  if (obj.isLight) {
    if (orig.lightIntensity !== undefined && Math.abs(obj.intensity - orig.lightIntensity) > 0.001) changes.intensity = obj.intensity.toFixed(2);
    if (orig.lightColor && '#' + obj.color.getHexString() !== orig.lightColor) changes.color = '0x' + obj.color.getHexString();
    if (obj.isPointLight) {
      if (orig.distance !== undefined && Math.abs(obj.distance - orig.distance) > 0.01) changes.distance = obj.distance.toFixed(1);
      if (orig.decay !== undefined && Math.abs(obj.decay - orig.decay) > 0.001) changes.decay = obj.decay.toFixed(2);
    }
  }
  if (orig.mat) {
    let mat = null;
    if (obj.isMesh && obj.material) mat = obj.material;
    else if (obj.isGroup) obj.traverse(c => { if (!mat && c.isMesh) mat = c.material; });
    if (mat) {
      const om = orig.mat;
      if (mat.color && om.color && '#' + mat.color.getHexString() !== om.color) changes['material.color'] = '0x' + mat.color.getHexString();
      if (om.metalness !== undefined && Math.abs(mat.metalness - om.metalness) > 0.001) changes['material.metalness'] = mat.metalness.toFixed(3);
      if (om.roughness !== undefined && Math.abs(mat.roughness - om.roughness) > 0.001) changes['material.roughness'] = mat.roughness.toFixed(3);
      if (om.clearcoat !== undefined && Math.abs(mat.clearcoat - om.clearcoat) > 0.001) changes['material.clearcoat'] = mat.clearcoat.toFixed(3);
      if (om.opacity !== undefined && Math.abs(mat.opacity - om.opacity) > 0.001) changes['material.opacity'] = mat.opacity.toFixed(3);
      if (mat.emissive && om.emissiveColor && '#' + mat.emissive.getHexString() !== om.emissiveColor) changes['material.emissive'] = '0x' + mat.emissive.getHexString();
      if (om.emissiveIntensity !== undefined && Math.abs((mat.emissiveIntensity||0) - om.emissiveIntensity) > 0.001) changes['material.emissiveIntensity'] = (mat.emissiveIntensity||0).toFixed(3);
      if (mat.normalScale && om.normalScaleX !== undefined && Math.abs(mat.normalScale.x - om.normalScaleX) > 0.001) changes['material.normalScale'] = mat.normalScale.x.toFixed(3);
      if (mat.map) {
        if (om.tilingX !== undefined && Math.abs(mat.map.repeat.x - om.tilingX) > 0.001) changes['texture.repeat.x'] = mat.map.repeat.x.toFixed(3);
        if (om.tilingY !== undefined && Math.abs(mat.map.repeat.y - om.tilingY) > 0.001) changes['texture.repeat.y'] = mat.map.repeat.y.toFixed(3);
        if (om.offsetX !== undefined && Math.abs(mat.map.offset.x - om.offsetX) > 0.001) changes['texture.offset.x'] = mat.map.offset.x.toFixed(3);
        if (om.offsetY !== undefined && Math.abs(mat.map.offset.y - om.offsetY) > 0.001) changes['texture.offset.y'] = mat.map.offset.y.toFixed(3);
        if (om.texRotation !== undefined && Math.abs(mat.map.rotation - om.texRotation) > 0.001) changes['texture.rotation'] = mat.map.rotation.toFixed(4);
      }
    }
  }
  if (Object.keys(changes).length > 0) changedValues[obj.name] = changes;
  else delete changedValues[obj.name];
  updatePromptOutput();
}

function updatePromptOutput() {
  const el = document.getElementById('prompt-output');
  const names = Object.keys(changedValues);
  if (names.length === 0) { el.textContent = 'No changes recorded yet.'; return; }
  let lines = ['Update TransformPlayer.jsx with these values:'];
  names.forEach(name => {
    const changes = changedValues[name];
    Object.entries(changes).forEach(([prop, val]) => {
      if (prop === 'position') lines.push(`${name}.position.set(${val})`);
      else if (prop === 'rotation') lines.push(`${name}.rotation.set(${val})`);
      else if (prop === 'scale') lines.push(`${name}.scale.set(${val})`);
      else if (prop === 'intensity') lines.push(`${name}.intensity = ${val}`);
      else if (prop === 'color') lines.push(`${name}.color = ${val}`);
      else if (prop === 'distance') lines.push(`${name}.distance = ${val}`);
      else if (prop === 'decay') lines.push(`${name}.decay = ${val}`);
      else lines.push(`${name}.${prop} = ${val}`);
    });
  });
  el.textContent = lines.join('\n');
}

// ─── Transform Mode ───
function setTransformMode(mode) {
  transformControls.setMode(mode);
  document.getElementById('btn-move').classList.toggle('active', mode === 'translate');
  document.getElementById('btn-rotate').classList.toggle('active', mode === 'rotate');
  document.getElementById('btn-scale').classList.toggle('active', mode === 'scale');
}

// ─── Toggles ───
function toggleGrid() {
  showGrid = !showGrid; gridHelper.visible = showGrid;
  document.getElementById('btn-grid').classList.toggle('active', showGrid);
}
function toggleAxes() {
  showAxes = !showAxes; axesHelper.visible = showAxes;
  document.getElementById('btn-axes').classList.toggle('active', showAxes);
}
function toggleHelpers() {
  showHelpers = !showHelpers;
  lightHelpers.forEach(h => h.visible = showHelpers);
  lightProxies.forEach((light, proxy) => { proxy.visible = showHelpers; });
  document.getElementById('btn-helpers').classList.toggle('active', showHelpers);
}
function toggleWireframe() {
  wireframeOn = !wireframeOn;
  allMats.forEach(m => { if (m.wireframe !== undefined) m.wireframe = wireframeOn; });
  document.getElementById('btn-wireframe').classList.toggle('active', wireframeOn);
}

// ─── Play Animation ───
function playAnimation() {
  const tl = gsap.timeline();
  tl.to(camera.position, { x: 5, z: 9, duration: 1.5, ease: 'power2.inOut' });
  tl.to(camera.position, { x: -5, duration: 1.5, ease: 'power2.inOut' });
  tl.to(camera.position, { x: 0, z: 11.5, duration: 1.5, ease: 'power2.inOut' });
}

// ─── Reset Scene ───
function resetScene() {
  Object.entries(originalValues).forEach(([name, orig]) => {
    const obj = namedObjects[name];
    if (!obj) return;
    if (orig.pos) obj.position.copy(orig.pos);
    if (orig.rot && !obj.isLight) obj.rotation.copy(orig.rot);
    if (orig.scale && !obj.isLight) obj.scale.copy(orig.scale);
    if (obj.isLight) {
      if (orig.lightColor) obj.color.set(orig.lightColor);
      if (orig.lightIntensity !== undefined) obj.intensity = orig.lightIntensity;
      if (orig.distance !== undefined) obj.distance = orig.distance;
      if (orig.decay !== undefined) obj.decay = orig.decay;
    }
    if (orig.mat) {
      let mat = null;
      if (obj.isMesh && obj.material) mat = obj.material;
      else if (obj.isGroup) obj.traverse(c => { if (!mat && c.isMesh) mat = c.material; });
      if (mat) {
        const om = orig.mat;
        if (om.color && mat.color) mat.color.set(om.color);
        if (om.metalness !== undefined) mat.metalness = om.metalness;
        if (om.roughness !== undefined) mat.roughness = om.roughness;
        if (om.clearcoat !== undefined) mat.clearcoat = om.clearcoat;
        if (om.opacity !== undefined) mat.opacity = om.opacity;
        if (om.emissiveColor && mat.emissive) mat.emissive.set(om.emissiveColor);
        if (om.emissiveIntensity !== undefined) mat.emissiveIntensity = om.emissiveIntensity;
        if (mat.normalScale && om.normalScaleX !== undefined) mat.normalScale.set(om.normalScaleX, om.normalScaleX);
        if (mat.map) {
          if (om.tilingX !== undefined) mat.map.repeat.x = om.tilingX;
          if (om.tilingY !== undefined) mat.map.repeat.y = om.tilingY;
          if (om.offsetX !== undefined) mat.map.offset.x = om.offsetX;
          if (om.offsetY !== undefined) mat.map.offset.y = om.offsetY;
          if (om.texRotation !== undefined) mat.map.rotation = om.texRotation;
        }
        mat.needsUpdate = true;
      }
    }
  });
  Object.keys(changedValues).forEach(k => delete changedValues[k]);
  updatePromptOutput();
  if (selectedObject) buildInspector(selectedObject);
}

// ─── Keyboard Shortcuts ───
function onKeyDown(e) {
  if (e.target.tagName === 'INPUT') return;
  switch (e.key.toLowerCase()) {
    case 'w': setTransformMode('translate'); break;
    case 'e': setTransformMode('rotate'); break;
    case 'r': setTransformMode('scale'); break;
    case 'escape': deselectObject(); break;
  }
}

// ─── Copy ───
window.copyPrompt = function() {
  const text = document.getElementById('prompt-output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
};

// ─── Boot ───
init();
</script>
