<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransformPlayer 3D Editor</title>
<script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
  }
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0d0d14;color:#ccc;font-size:12px;}

/* ── Layout ── */
#app{display:flex;height:100vh;flex-direction:column;}
#main{display:flex;flex:1;min-height:0;}

/* ── Dual Viewports ── */
#viewports{display:flex;flex:1;min-width:0;position:relative;}
#vp-preview{position:relative;background:#060610;overflow:hidden;transition:flex 0.3s ease;}
#vp-inspect{position:relative;background:#08080e;overflow:hidden;border-left:2px solid #222;transition:flex 0.3s ease;}
#vp-preview canvas,#vp-inspect canvas{width:100%;height:100%;display:block;}
.vp-label{position:absolute;top:8px;left:10px;background:rgba(0,0,0,0.65);color:#8af;padding:3px 10px;border-radius:4px;font:11px/1.4 monospace;z-index:5;pointer-events:none;}
#vp-inspect .vp-label{color:#fa8;}
#swap-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;background:rgba(30,30,50,0.85);color:#aac;border:1px solid #445;padding:5px 10px;border-radius:6px;cursor:pointer;font:11px/1 monospace;transition:background 0.2s;}
#swap-btn:hover{background:rgba(60,60,100,0.95);color:#fff;}

/* viewport flex proportions */
.layout-normal #vp-preview{flex:6;}
.layout-normal #vp-inspect{flex:4;}
.layout-swapped #vp-preview{flex:4;}
.layout-swapped #vp-inspect{flex:6;}

/* ── Slide-in Panel ── */
#panel-toggle{position:absolute;top:50%;right:0;transform:translateY(-50%);z-index:20;background:#1a1a28;color:#aac;border:1px solid #333;border-right:none;padding:8px 4px;border-radius:6px 0 0 6px;cursor:pointer;font-size:14px;line-height:1;writing-mode:vertical-rl;letter-spacing:1px;transition:background 0.2s;}
#panel-toggle:hover{background:#2a2a40;color:#fff;}
#panel{position:absolute;top:0;right:0;width:360px;height:100%;background:#13131e;overflow-y:auto;overflow-x:hidden;border-left:1px solid #2a2a3a;z-index:15;transform:translateX(100%);transition:transform 0.3s ease;display:flex;flex-direction:column;}
#panel.open{transform:translateX(0);}

/* Panel sections */
.section{border-bottom:1px solid #222;}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#181828;cursor:pointer;user-select:none;border-bottom:1px solid #1e1e2e;}
.section-header:hover{background:#1e1e30;}
.section-header h3{font-size:12px;font-weight:600;color:#aab;letter-spacing:0.5px;text-transform:uppercase;}
.section-arrow{color:#667;font-size:10px;transition:transform 0.2s;}
.section.collapsed .section-arrow{transform:rotate(-90deg);}
.section.collapsed .section-body{display:none;}
.section-body{padding:8px 12px 10px;}

/* Controls */
.ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;min-height:22px;}
.ctrl-label{width:70px;min-width:70px;font-size:11px;color:#889;text-align:right;flex-shrink:0;}
.ctrl-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:#2a2a3a;border-radius:2px;outline:none;}
.ctrl-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#5577cc;cursor:pointer;border:none;}
.ctrl-slider::-webkit-slider-thumb:hover{background:#6688dd;}
.ctrl-val{width:46px;min-width:46px;font:11px/1 'Fira Code',monospace;color:#8cf;text-align:right;}
.ctrl-color{width:28px;height:20px;border:1px solid #444;border-radius:3px;cursor:pointer;padding:0;background:none;}
.ctrl-color::-webkit-color-swatch-wrapper{padding:0;}
.ctrl-color::-webkit-color-swatch{border:none;border-radius:2px;}

/* Type selector buttons */
.type-btns{display:flex;gap:3px;}
.type-btn{padding:2px 8px;font-size:10px;background:#1e1e30;color:#778;border:1px solid #333;border-radius:3px;cursor:pointer;transition:all 0.15s;}
.type-btn:hover{background:#2a2a40;color:#aab;}
.type-btn.active{background:#334;color:#9bf;border-color:#558;}

/* Toggle */
.ctrl-toggle{position:relative;width:32px;height:16px;background:#2a2a3a;border-radius:8px;cursor:pointer;transition:background 0.2s;flex-shrink:0;}
.ctrl-toggle.on{background:#3a6;}
.ctrl-toggle::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;background:#ccc;border-radius:50%;transition:left 0.2s;}
.ctrl-toggle.on::after{left:18px;}

/* Buttons */
.btn{padding:5px 14px;font-size:11px;font-weight:600;border:1px solid #444;border-radius:4px;cursor:pointer;background:#1e1e30;color:#aab;transition:all 0.15s;}
.btn:hover{background:#2a2a40;color:#fff;}
.btn-primary{background:#2a5599;color:#dde;border-color:#3a6;}
.btn-primary:hover{background:#3a66aa;}
.btn-sm{padding:3px 10px;font-size:10px;}

/* Preset dropdown */
.preset-select{flex:1;background:#1e1e30;color:#aab;border:1px solid #333;border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer;}
.preset-select:focus{outline:none;border-color:#558;}

/* Sub-section */
.sub-header{font-size:10px;color:#667;text-transform:uppercase;letter-spacing:0.5px;margin:6px 0 4px;padding-bottom:2px;border-bottom:1px solid #1a1a2a;}
.light-block{background:#0e0e18;border:1px solid #1e1e2e;border-radius:4px;margin-bottom:6px;padding:6px 8px;}
.light-block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.light-block-name{font-size:11px;font-weight:600;color:#9ab;}
.mat-block{background:#0e0e18;border:1px solid #1e1e2e;border-radius:4px;margin-bottom:6px;padding:6px 8px;}
.mat-block-header{font-size:11px;font-weight:600;color:#9ab;margin-bottom:4px;}

/* Bottom bar */
#bottom-bar{background:#111120;border-top:1px solid #2a2a3a;padding:6px 12px;display:flex;align-items:flex-start;gap:10px;max-height:150px;}
#prompt-output{flex:1;font:11px/1.5 'Fira Code','Consolas',monospace;color:#8f8;background:#090914;border:1px solid #2a2a3a;border-radius:4px;padding:6px;overflow-y:auto;max-height:130px;white-space:pre-wrap;}
#copy-btn{background:#2a6;color:#fff;border:none;padding:5px 14px;border-radius:4px;cursor:pointer;font-weight:600;white-space:nowrap;font-size:11px;}
#copy-btn:hover{background:#3b7;}

/* Scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:#111;}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#555;}

/* FPS counter */
.fps{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);color:#0f0;padding:2px 6px;border-radius:3px;font:11px monospace;z-index:5;pointer-events:none;}
</style>
</head>
<body>
<div id="app">
  <div id="main">
    <div id="viewports" class="layout-normal">
      <div id="vp-preview">
        <canvas id="canvas-preview"></canvas>
        <span class="vp-label">PREVIEW (front z=11.5)</span>
        <span class="fps" id="fps-preview"></span>
      </div>
      <div id="vp-inspect">
        <canvas id="canvas-inspect"></canvas>
        <span class="vp-label">INSPECT (orbit)</span>
        <span class="fps" id="fps-inspect"></span>
      </div>
      <button id="swap-btn" title="Swap viewport sizes">&#x21C4;</button>
      <button id="panel-toggle">CTRL</button>
    </div>
    <div id="panel">
      <!-- Lighting Presets -->
      <div class="section">
        <div class="section-header" data-section="presets"><h3>Presets</h3><span class="section-arrow">&#9660;</span></div>
        <div class="section-body">
          <div class="ctrl-row">
            <select class="preset-select" id="preset-select">
              <option value="default">Default</option>
              <option value="studio">Studio</option>
              <option value="dramatic">Dramatic</option>
              <option value="cybertronian">Cybertronian</option>
              <option value="bright">Bright</option>
            </select>
            <button class="btn btn-sm" id="preset-apply">Apply</button>
          </div>
        </div>
      </div>
      <!-- Scene -->
      <div class="section">
        <div class="section-header" data-section="scene"><h3>Scene</h3><span class="section-arrow">&#9660;</span></div>
        <div class="section-body" id="scene-controls"></div>
      </div>
      <!-- Lights -->
      <div class="section">
        <div class="section-header" data-section="lights"><h3>Lights</h3><span class="section-arrow">&#9660;</span></div>
        <div class="section-body" id="light-controls"></div>
      </div>
      <!-- Materials -->
      <div class="section">
        <div class="section-header" data-section="materials"><h3>Materials</h3><span class="section-arrow">&#9660;</span></div>
        <div class="section-body" id="mat-controls"></div>
      </div>
      <!-- Glow -->
      <div class="section">
        <div class="section-header" data-section="glow"><h3>Glow</h3><span class="section-arrow">&#9660;</span></div>
        <div class="section-body" id="glow-controls"></div>
      </div>
      <!-- Animation -->
      <div class="section">
        <div class="section-header" data-section="anim"><h3>Animation</h3><span class="section-arrow">&#9660;</span></div>
        <div class="section-body">
          <div class="ctrl-row" style="gap:6px;">
            <button class="btn btn-primary" id="anim-play">&#9654; Play</button>
            <button class="btn" id="anim-reset">&#8634; Reset</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="bottom-bar">
    <pre id="prompt-output">No changes yet.</pre>
    <button id="copy-btn">Copy</button>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DEFAULT CONFIG — matches TransformPlayer.jsx
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const DEFAULTS = {
  exposure: 1.84,
  ambient: 0.01,
  background: '#09090c',
  lights: {
    key:  { type:'Directional', color:'#ffeedd', intensity:2.5, x:-1.3, y:3.1, z:-2.7 },
    fill: { type:'Directional', color:'#3355aa', intensity:2.3, x:0.7, y:1.3, z:-12.6 },
    rim:  { type:'Directional', color:'#ff6633', intensity:1.6, x:-5.4, y:-5.9, z:-15.0 },
    orb1: { type:'Point', color:'#ff3300', intensity:3.2, x:3.6, y:-2.2, z:0.5 },
    orb2: { type:'Point', color:'#0044ff', intensity:6.1, x:-3.7, y:-2.2, z:0.0 },
  },
  materials: {
    crimson:  { color:'#ca2f47', metalness:0.38, roughness:0.34, clearcoat:0.16, normalStrength:1.0, normalEnabled:true, texTileX:0.2, texTileY:0.1, texOffX:0, texOffY:0, texEnabled:true },
    navy:     { color:'#2a3090', metalness:0.45, roughness:0.31, clearcoat:0.50, normalStrength:2.0, normalEnabled:true, texTileX:4.5, texTileY:2.3, texOffX:0, texOffY:0, texEnabled:true },
    gunmetal: { color:'#2a2a38', metalness:0.89, roughness:0.29, clearcoat:0.30, normalStrength:0.5, normalEnabled:true, texTileX:3.8, texTileY:1.0, texOffX:0, texOffY:0, texEnabled:true },
  },
  glow: {
    ledColor: '#22aaff', ledOpacity: 1.0,
    orangeColor: '#ff6600', orangeOpacity: 0.8,
    pulseSpeed: 2.6, pulseMin: 0.45,
  },
};

const PRESETS = {
  default: JSON.parse(JSON.stringify(DEFAULTS)),
  studio: {
    exposure:1.6, ambient:0.05, background:'#0a0a10',
    lights:{
      key:{type:'Directional',color:'#ffffff',intensity:3.0,x:-2,y:4,z:3},
      fill:{type:'Directional',color:'#6688bb',intensity:1.5,x:3,y:1,z:2},
      rim:{type:'Directional',color:'#ffffff',intensity:2.0,x:0,y:-1,z:-5},
      orb1:{type:'Point',color:'#ff8844',intensity:1.0,x:5,y:0,z:0},
      orb2:{type:'Point',color:'#4488ff',intensity:1.0,x:-5,y:0,z:0},
    },
  },
  dramatic: {
    exposure:2.2, ambient:0.002, background:'#050508',
    lights:{
      key:{type:'Spot',color:'#ffeedd',intensity:4.0,x:0,y:5,z:2},
      fill:{type:'Point',color:'#1a2266',intensity:0.8,x:3,y:-1,z:1},
      rim:{type:'Directional',color:'#ff4422',intensity:3.5,x:-4,y:-2,z:-8},
      orb1:{type:'Point',color:'#ff2200',intensity:5.0,x:4,y:-3,z:0},
      orb2:{type:'Point',color:'#0022aa',intensity:2.0,x:-4,y:3,z:0},
    },
  },
  cybertronian: {
    exposure:1.9, ambient:0.01, background:'#060612',
    lights:{
      key:{type:'Directional',color:'#4488ff',intensity:3.0,x:-1,y:3,z:-3},
      fill:{type:'Directional',color:'#2244aa',intensity:2.8,x:1,y:1,z:-10},
      rim:{type:'Directional',color:'#ff6600',intensity:2.5,x:-5,y:-5,z:-12},
      orb1:{type:'Point',color:'#ff4400',intensity:4.5,x:4,y:-2,z:1},
      orb2:{type:'Point',color:'#0055ff',intensity:8.0,x:-4,y:-2,z:0},
    },
  },
  bright: {
    exposure:2.5, ambient:0.15, background:'#141418',
    lights:{
      key:{type:'Directional',color:'#ffffff',intensity:2.0,x:-2,y:3,z:3},
      fill:{type:'Directional',color:'#aabbdd',intensity:2.0,x:2,y:1,z:3},
      rim:{type:'Directional',color:'#ffddbb',intensity:1.5,x:0,y:-3,z:-5},
      orb1:{type:'Point',color:'#ffaa66',intensity:2.0,x:5,y:0,z:2},
      orb2:{type:'Point',color:'#6699ff',intensity:2.0,x:-5,y:0,z:2},
    },
  },
};
// Fill missing material/glow fields in presets from defaults
['studio','dramatic','cybertronian','bright'].forEach(k => {
  if (!PRESETS[k].materials) PRESETS[k].materials = JSON.parse(JSON.stringify(DEFAULTS.materials));
  if (!PRESETS[k].glow) PRESETS[k].glow = JSON.parse(JSON.stringify(DEFAULTS.glow));
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STATE — current values (clone of defaults)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let STATE = JSON.parse(JSON.stringify(DEFAULTS));

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// THREE.JS SETUP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const scene = new THREE.Scene();
scene.background = new THREE.Color(STATE.background);

const allGeos = [], allMats = [];

// ── Renderers ──
const canvasPreview = document.getElementById('canvas-preview');
const canvasInspect = document.getElementById('canvas-inspect');
const rendererPreview = new THREE.WebGLRenderer({ canvas: canvasPreview, antialias: true });
rendererPreview.toneMapping = THREE.ACESFilmicToneMapping;
rendererPreview.toneMappingExposure = STATE.exposure;
rendererPreview.setPixelRatio(Math.min(devicePixelRatio, 2));

const rendererInspect = new THREE.WebGLRenderer({ canvas: canvasInspect, antialias: true });
rendererInspect.toneMapping = THREE.ACESFilmicToneMapping;
rendererInspect.toneMappingExposure = STATE.exposure;
rendererInspect.setPixelRatio(Math.min(devicePixelRatio, 2));

// ── Cameras ──
const camPreview = new THREE.PerspectiveCamera(45, 1, 0.1, 200);
camPreview.position.set(0, 0, 11.5);

const camInspect = new THREE.PerspectiveCamera(45, 1, 0.1, 200);
camInspect.position.set(6, 4, 10);
camInspect.lookAt(0, 0, 0);

// ── OrbitControls for inspect camera ──
const orbit = new OrbitControls(camInspect, canvasInspect);
orbit.enableDamping = true;
orbit.dampingFactor = 0.08;
orbit.target.set(0, 0, 0);

// ── Grid + Axes (inspect only) ──
const gridHelper = new THREE.GridHelper(20, 20, 0x333344, 0x222233);
gridHelper.rotation.x = Math.PI / 2; // face camera Z
const axesHelper = new THREE.AxesHelper(3);
// These are added to scene but only rendered in inspect viewport
let showGrid = true, showAxes = true, showWireframe = false;

// ── Environment map ──
const pmrem = new THREE.PMREMGenerator(rendererPreview);
const envS = new THREE.Scene();
envS.add(new THREE.HemisphereLight(0x7799cc, 0x443322, 3.5));
const ep1 = new THREE.PointLight(0xff4400, 2, 30); ep1.position.set(8, 5, 8); envS.add(ep1);
const ep2 = new THREE.PointLight(0x0044cc, 1.5, 30); ep2.position.set(-8, -3, 8); envS.add(ep2);
scene.environment = pmrem.fromScene(envS, 0.04).texture;
pmrem.dispose();

// ── Texture Loading ──
const loader = new THREE.TextureLoader();
const textures = {};
function loadTex(path, repeatX = 1, repeatY = 1) {
  const tex = loader.load(path, undefined, undefined, () => {});
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.repeat.set(repeatX, repeatY);
  return tex;
}

const TEX_BASE = '../public/textures/';
textures.redMap = loadTex(TEX_BASE + 'red-metal.jpg', 0.2, 0.1);
textures.blueMap = loadTex(TEX_BASE + 'blue-metal.jpg', 4.5, 2.3);
textures.darkMap = loadTex(TEX_BASE + 'dark-metal.jpg', 3.8, 1.0);
textures.circuitMap = loadTex(TEX_BASE + 'circuit-glow.jpg', 2, 0.5);
textures.redNorm = loadTex(TEX_BASE + 'red-normal.jpg', 0.2, 0.1);
textures.blueNorm = loadTex(TEX_BASE + 'blue-normal.jpg', 4.5, 2.3);
textures.greebleNorm = loadTex(TEX_BASE + 'greeble-normal.jpg', 3.8, 1.0);

// Save original texture references for enable/disable
const savedTextures = {};

// ── Materials ──
const mats = {};
mats.crimson = new THREE.MeshPhysicalMaterial({
  color: new THREE.Color(STATE.materials.crimson.color),
  map: textures.redMap, normalMap: textures.redNorm,
  normalScale: new THREE.Vector2(1.0, 1.0),
  metalness: 0.38, roughness: 0.34, clearcoat: 0.16, clearcoatRoughness: 0.06,
});
mats.navy = new THREE.MeshPhysicalMaterial({
  color: new THREE.Color(STATE.materials.navy.color),
  map: textures.blueMap, normalMap: textures.blueNorm,
  normalScale: new THREE.Vector2(2.0, 2.0),
  metalness: 0.45, roughness: 0.31, clearcoat: 0.5, clearcoatRoughness: 0.08,
});
mats.gunmetal = new THREE.MeshPhysicalMaterial({
  color: new THREE.Color(STATE.materials.gunmetal.color),
  map: textures.darkMap, normalMap: textures.greebleNorm,
  normalScale: new THREE.Vector2(0.5, 0.5),
  metalness: 0.89, roughness: 0.29, clearcoat: 0.3,
});
mats.chrome = new THREE.MeshPhysicalMaterial({
  color: 0xbbbbcc, metalness: 1.0, roughness: 0.03, clearcoat: 1.0, clearcoatRoughness: 0.01,
});
mats.steel = new THREE.MeshPhysicalMaterial({
  color: 0x607080, metalness: 0.95, roughness: 0.1, clearcoat: 0.4,
});
mats.greeb = new THREE.MeshPhysicalMaterial({
  color: 0x444455, metalness: 0.9, roughness: 0.15, clearcoat: 0.3,
});
mats.ledGlow = new THREE.MeshBasicMaterial({ color: new THREE.Color(STATE.glow.ledColor), transparent: true, opacity: STATE.glow.ledOpacity });
mats.orangeGlow = new THREE.MeshBasicMaterial({ color: new THREE.Color(STATE.glow.orangeColor), transparent: true, opacity: STATE.glow.orangeOpacity });
Object.values(mats).forEach(m => allMats.push(m));

// Save texture references for enable/disable
savedTextures.crimson = { map: mats.crimson.map };
savedTextures.navy = { map: mats.navy.map };
savedTextures.gunmetal = { map: mats.gunmetal.map };

// ── Geometry helpers ──
function bevelBox(w, h, d, bevel = 0.07) {
  const shape = new THREE.Shape();
  const hw = w / 2 - bevel, hh = h / 2 - bevel;
  shape.moveTo(-hw, -h / 2);
  shape.lineTo(hw, -h / 2);
  shape.lineTo(w / 2, -hh);
  shape.lineTo(w / 2, hh);
  shape.lineTo(hw, h / 2);
  shape.lineTo(-hw, h / 2);
  shape.lineTo(-w / 2, hh);
  shape.lineTo(-w / 2, -hh);
  shape.closePath();
  const geo = new THREE.ExtrudeGeometry(shape, {
    depth: d, bevelEnabled: true,
    bevelThickness: bevel * 0.8, bevelSize: bevel * 0.8, bevelSegments: 3,
  });
  allGeos.push(geo);
  return geo;
}

function makeGearGeo(outerR, innerR, teeth, thickness) {
  const shape = new THREE.Shape();
  const steps = teeth * 2;
  for (let i = 0; i < steps; i++) {
    const a = (i / steps) * Math.PI * 2;
    const r = i % 2 === 0 ? outerR : innerR;
    if (i === 0) shape.moveTo(Math.cos(a) * r, Math.sin(a) * r);
    else shape.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  shape.closePath();
  const hole = new THREE.Path();
  for (let i = 0; i < 16; i++) {
    const a = (i / 16) * Math.PI * 2;
    if (i === 0) hole.moveTo(Math.cos(a) * innerR * 0.35, Math.sin(a) * innerR * 0.35);
    else hole.lineTo(Math.cos(a) * innerR * 0.35, Math.sin(a) * innerR * 0.35);
  }
  shape.holes.push(hole);
  const geo = new THREE.ExtrudeGeometry(shape, {
    depth: thickness, bevelEnabled: true,
    bevelThickness: 0.012, bevelSize: 0.012, bevelSegments: 2,
  });
  allGeos.push(geo);
  return geo;
}

function addGreebleStrip(parent, x, y, z, length, vertical, mat) {
  const count = Math.floor(length / 0.25);
  for (let i = 0; i < count; i++) {
    const type = Math.random();
    let geo;
    if (type < 0.3) geo = new THREE.CylinderGeometry(0.035, 0.035, 0.05, 6);
    else if (type < 0.6) geo = new THREE.BoxGeometry(0.12, 0.04, 0.04);
    else if (type < 0.8) geo = new THREE.CylinderGeometry(0.02, 0.02, 0.15, 6);
    else geo = new THREE.SphereGeometry(0.025, 6, 4);
    allGeos.push(geo);
    const mesh = new THREE.Mesh(geo, mat);
    const offset = -length / 2 + (i + 0.5) * (length / count);
    if (vertical) {
      mesh.position.set(x, y + offset, z);
      if (type >= 0.6 && type < 0.8) mesh.rotation.z = Math.PI / 2;
    } else {
      mesh.position.set(x + offset, y, z);
    }
    if (type < 0.3) mesh.rotation.x = Math.PI / 2;
    parent.add(mesh);
  }
}

  geo.translate(-(bb.max.x + bb.min.x) / 2, -(bb.max.y + bb.min.y) / 2, -(bb.max.z + bb.min.z) / 2);
}

const lights = {};
const lightHelpers = {};

function createLight(name, cfg) {
  // Remove old
  if (lights[name]) {
    scene.remove(lights[name]);
    if (lights[name].target) scene.remove(lights[name].target);
  }
  if (lightHelpers[name]) {
    scene.remove(lightHelpers[name]);
    lightHelpers[name].dispose?.();
    lightHelpers[name] = null;
  }
  const c = new THREE.Color(cfg.color);
  let light;
  if (cfg.type === 'Point') {
    light = new THREE.PointLight(c, cfg.intensity, 30);
  } else if (cfg.type === 'Spot') {
    light = new THREE.SpotLight(c, cfg.intensity, 40, Math.PI / 6, 0.5, 1);
    light.target.position.set(0, 0, 0);
    scene.add(light.target);
  } else {
    light = new THREE.DirectionalLight(c, cfg.intensity);
  }
  light.position.set(cfg.x, cfg.y, cfg.z);
  scene.add(light);
  lights[name] = light;
  return light;
}

// Initialize lights
Object.entries(STATE.lights).forEach(([name, cfg]) => createLight(name, cfg));

function toggleHelper(name, show) {
  if (lightHelpers[name]) {
    scene.remove(lightHelpers[name]);
    lightHelpers[name].dispose?.();
    lightHelpers[name] = null;
  }
  if (!show || !lights[name]) return;
  const light = lights[name];
  let helper;
  if (light.isPointLight) {
    helper = new THREE.PointLightHelper(light, 0.5);
  } else if (light.isDirectionalLight) {
    helper = new THREE.DirectionalLightHelper(light, 1);
  } else if (light.isSpotLight) {
    helper = new THREE.SpotLightHelper(light);
  }
  if (helper) {
    scene.add(helper);
    lightHelpers[name] = helper;
  }
}

// ANIMATION (GSAP)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const cs = 0.68;
const pieces = [
  { mesh: topBar, start: { p:[0, cs*0.4, 0], r:[0,0,0], s:[cs/frameW, 0.8, cs/barD*0.5] },
    mid: { p:[0, cs*1.2, 0.3], r:[0.15,0,0], s:[cs/frameW*2, 1, cs/barD*0.7] },
    end: { p:[0, frameH/2-barW/2, 0], r:[0,0,0], s:[1,1,1] } },
  { mesh: bottomBar, start: { p:[0, -cs*0.4, 0], r:[0,0,0], s:[cs/frameW, 0.8, cs/barD*0.5] },
    mid: { p:[0, -cs*1.2, 0.3], r:[-0.15,0,0], s:[cs/frameW*2, 1, cs/barD*0.7] },
    end: { p:[0, -frameH/2+barW/2, 0], r:[0,0,0], s:[1,1,1] } },
  { mesh: leftBar, start: { p:[-cs*0.4, 0, 0], r:[0,0,Math.PI/2], s:[0.8, cs/(frameH-barW*2), cs/barD*0.5] },
    mid: { p:[-cs*1.5, 0, 0.2], r:[0,0.2,Math.PI/4], s:[0.9, cs/(frameH-barW*2)*1.5, cs/barD*0.7] },
    end: { p:[-frameW/2+barW/2, 0, 0], r:[0,0,0], s:[1,1,1] } },
  { mesh: rightBar, start: { p:[cs*0.4, 0, 0], r:[0,0,-Math.PI/2], s:[0.8, cs/(frameH-barW*2), cs/barD*0.5] },
    mid: { p:[cs*1.5, 0, 0.2], r:[0,-0.2,-Math.PI/4], s:[0.9, cs/(frameH-barW*2)*1.5, cs/barD*0.7] },
    end: { p:[frameW/2-barW/2, 0, 0], r:[0,0,0], s:[1,1,1] } },
  { mesh: backPanel, start: { p:[0, 0, cs*0.4], r:[0,Math.PI,0], s:[cs/(frameW-barW*2), cs/(frameH-barW*2), 0.8] },
    mid: { p:[0, 0, 0], r:[0,Math.PI/2,0], s:[cs/(frameW-barW*2)*1.5, cs/(frameH-barW*2)*1.5, 1] },
    end: { p:[0, 0, -barD*0.5], r:[0,0,0], s:[1,1,1] } },
];

let currentTl = null;
let isAnimating = false;
let animatedToStart = false;

function resetToFinal() {
  if (currentTl) { currentTl.kill(); currentTl = null; }
  isAnimating = false;
  animatedToStart = false;
  pieces.forEach(({ mesh, end }) => {
    mesh.position.set(end.p[0], end.p[1], end.p[2]);
    mesh.rotation.set(end.r[0], end.r[1], end.r[2]);
    mesh.scale.set(end.s[0], end.s[1], end.s[2]);
  });
  gears.forEach(({ mesh }) => mesh.scale.set(1, 1, 1));
  pistons.forEach(({ mesh }) => mesh.scale.set(1, 1, 1));
  glowMeshes.forEach(g => { g.material.opacity = STATE.glow.ledOpacity; });
  orangeMeshes.forEach(g => { g.material.opacity = STATE.glow.orangeOpacity; });
}

function playAnimation() {
  if (isAnimating) return;
  isAnimating = true;
  // First move to cube state
  pieces.forEach(({ mesh, start }) => {
    mesh.position.set(start.p[0], start.p[1], start.p[2]);
    mesh.rotation.set(start.r[0], start.r[1], start.r[2]);
    mesh.scale.set(start.s[0], start.s[1], start.s[2]);
  });
  gears.forEach(({ mesh }) => mesh.scale.set(0, 0, 0));
  pistons.forEach(({ mesh }) => mesh.scale.set(0, 0, 0));
  glowMeshes.forEach(g => { g.material.opacity = 0; });
  orangeMeshes.forEach(g => { g.material.opacity = 0; });

  const tl = gsap.timeline({ onComplete: () => { isAnimating = false; } });
  currentTl = tl;

  // Pieces detach from cube (0.3-0.7s)
  pieces.forEach(({ mesh, mid }, i) => {
    const d = 0.3 + i * 0.05;
    tl.to(mesh.position, { x: mid.p[0], y: mid.p[1], z: mid.p[2], duration: 0.4, ease: 'power2.out' }, d);
    tl.to(mesh.rotation, { x: mid.r[0], y: mid.r[1], z: mid.r[2], duration: 0.4, ease: 'power2.out' }, d);
    tl.to(mesh.scale, { x: mid.s[0], y: mid.s[1], z: mid.s[2], duration: 0.4, ease: 'power2.out' }, d);
  });

  // Pieces to final (0.6-1.1s)
  pieces.forEach(({ mesh, end }, i) => {
    const d = 0.6 + i * 0.05;
    tl.to(mesh.position, { x: end.p[0], y: end.p[1], z: end.p[2], duration: 0.5, ease: 'power3.inOut' }, d);
    tl.to(mesh.rotation, { x: end.r[0], y: end.r[1], z: end.r[2], duration: 0.5, ease: 'power3.inOut' }, d);
    tl.to(mesh.scale, { x: end.s[0], y: end.s[1], z: end.s[2], duration: 0.5, ease: 'power3.inOut' }, d);
  });

  // Gears pop in
  gears.forEach(({ mesh }, i) => {
    tl.to(mesh.scale, { x: 1, y: 1, z: 1, duration: 0.3, ease: 'back.out(2.5)' }, 0.7 + i * 0.05);
  });

  // Pistons pop in
  pistons.forEach(({ mesh }, i) => {
    tl.to(mesh.scale, { x: 1, y: 1, z: 1, duration: 0.25, ease: 'back.out(2)' }, 0.9 + i * 0.06);
  });

  // Glows power on
  glowMeshes.forEach((g, i) => {
    tl.to(g.material, { opacity: STATE.glow.ledOpacity, duration: 0.15, ease: 'power2.out' }, 0.95 + i * 0.04);
  });
  orangeMeshes.forEach((g, i) => {
    tl.to(g.material, { opacity: STATE.glow.orangeOpacity, duration: 0.15, ease: 'power2.out' }, 1.0 + i * 0.03);
  });
}

// Start in final assembled state
resetToFinal();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RENDER LOOP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let time = 0;
let lastFrameTime = performance.now();
const fpsPreviewEl = document.getElementById('fps-preview');
const fpsInspectEl = document.getElementById('fps-inspect');
let frameCount = 0, fpsAccum = 0;

function resizeViewports() {
  const vpPreview = document.getElementById('vp-preview');
  const vpInspect = document.getElementById('vp-inspect');
  const pw = vpPreview.clientWidth, ph = vpPreview.clientHeight;
  const iw = vpInspect.clientWidth, ih = vpInspect.clientHeight;
  rendererPreview.setSize(pw, ph);
  camPreview.aspect = pw / ph;
  camPreview.updateProjectionMatrix();
  rendererInspect.setSize(iw, ih);
  camInspect.aspect = iw / ih;
  camInspect.updateProjectionMatrix();
}

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  time += dt;

  // FPS
  frameCount++;
  fpsAccum += dt;
  if (fpsAccum >= 0.5) {
    const fps = Math.round(frameCount / fpsAccum);
    fpsPreviewEl.textContent = fps + ' fps';
    fpsInspectEl.textContent = fps + ' fps';
    frameCount = 0;
    fpsAccum = 0;
  }

  // Gears spin
  gears.forEach(({ mesh, speed }) => { mesh.rotation.z += speed * dt; });
  // Pistons bob
  pistons.forEach(({ mesh, baseY }, i) => { mesh.position.y = baseY + Math.sin(time * 1.8 + i * Math.PI) * 0.15; });

  // Glow pulse (when not animating)
  if (!isAnimating) {
    const pulse = STATE.glow.pulseMin + (1 - STATE.glow.pulseMin) * 0.5 * (1 + Math.sin(time * STATE.glow.pulseSpeed));
    glowMeshes.forEach(g => { g.material.opacity = STATE.glow.ledOpacity * pulse; });
    orangeMeshes.forEach(g => { g.material.opacity = STATE.glow.orangeOpacity * pulse * 0.7; });
  }

  // Update helpers
  Object.values(lightHelpers).forEach(h => { if (h && h.update) h.update(); });

  // Orbit controls
  orbit.update();

  // Render preview viewport
  const gridVis = gridHelper.visible;
  const axesVis = axesHelper.visible;
  gridHelper.visible = false;
  axesHelper.visible = false;
  rendererPreview.render(scene, camPreview);

  // Render inspect viewport with grid/axes
  gridHelper.visible = showGrid;
  axesHelper.visible = showAxes;
  rendererInspect.render(scene, camInspect);
}

scene.add(gridHelper);
scene.add(axesHelper);
resizeViewports();
animate();

window.addEventListener('resize', resizeViewports);

// ── Helper: build control row ──
function makeSlider(label, min, max, step, value, onChange) {
  const row = document.createElement('div');
  row.className = 'ctrl-row';
  const lbl = document.createElement('span');
  lbl.className = 'ctrl-label';
  lbl.textContent = label;
  const slider = document.createElement('input');
  slider.type = 'range';
  slider.className = 'ctrl-slider';
  slider.min = min; slider.max = max; slider.step = step; slider.value = value;
  const val = document.createElement('span');
  val.className = 'ctrl-val';
  val.textContent = Number(value).toFixed(step < 0.1 ? 2 : step < 1 ? 1 : 0);
  slider.addEventListener('input', () => {
    const v = parseFloat(slider.value);
    val.textContent = v.toFixed(step < 0.1 ? 2 : step < 1 ? 1 : 0);
    onChange(v);
    updatePrompt();
  });
  row.append(lbl, slider, val);
  return { row, slider, val };
}

function makeColor(label, value, onChange) {
  const row = document.createElement('div');
  row.className = 'ctrl-row';
  const lbl = document.createElement('span');
  lbl.className = 'ctrl-label';
  lbl.textContent = label;
  const input = document.createElement('input');
  input.type = 'color';
  input.className = 'ctrl-color';
  input.value = value;
  input.addEventListener('input', () => {
    onChange(input.value);
    updatePrompt();
  });
  row.append(lbl, input);
  return { row, input };
}

function makeToggle(label, value, onChange) {
  const row = document.createElement('div');
  row.className = 'ctrl-row';
  const lbl = document.createElement('span');
  lbl.className = 'ctrl-label';
  lbl.textContent = label;
  const toggle = document.createElement('div');
  toggle.className = 'ctrl-toggle' + (value ? ' on' : '');
  toggle.addEventListener('click', () => {
    const newVal = !toggle.classList.contains('on');
    toggle.classList.toggle('on', newVal);
    onChange(newVal);
    updatePrompt();
  });
  row.append(lbl, toggle);
  return { row, toggle };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SCENE CONTROLS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const sceneEl = document.getElementById('scene-controls');

const bgCtrl = makeColor('Background', STATE.background, v => {
  STATE.background = v;
  scene.background = new THREE.Color(v);
});
sceneEl.appendChild(bgCtrl.row);

const expCtrl = makeSlider('Exposure', 0.1, 5, 0.01, STATE.exposure, v => {
  STATE.exposure = v;
  rendererPreview.toneMappingExposure = v;
  rendererInspect.toneMappingExposure = v;
});
sceneEl.appendChild(expCtrl.row);

const gridCtrl = makeToggle('Grid', showGrid, v => { showGrid = v; });
sceneEl.appendChild(gridCtrl.row);

const axesCtrl = makeToggle('Axes', showAxes, v => { showAxes = v; });
sceneEl.appendChild(axesCtrl.row);

const wireCtrl = makeToggle('Wireframe', showWireframe, v => {
  showWireframe = v;
  [mats.crimson, mats.navy, mats.gunmetal, mats.chrome, mats.steel, mats.greeb].forEach(m => { m.wireframe = v; });
});
sceneEl.appendChild(wireCtrl.row);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// LIGHT CONTROLS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const lightEl = document.getElementById('light-controls');

// Ambient
const ambBlock = document.createElement('div');
ambBlock.className = 'light-block';
ambBlock.innerHTML = '<div class="light-block-header"><span class="light-block-name">Ambient</span></div>';
const ambSlider = makeSlider('Intensity', 0, 1, 0.001, STATE.ambient, v => {
  STATE.ambient = v;
  ambientLight.intensity = v;
});
ambBlock.appendChild(ambSlider.row);
lightEl.appendChild(ambBlock);

const lightUIRefs = {};
const helperStates = {};

Object.entries(STATE.lights).forEach(([name, cfg]) => {
  helperStates[name] = false;
  const block = document.createElement('div');
  block.className = 'light-block';
  const header = document.createElement('div');
  header.className = 'light-block-header';
  header.innerHTML = `<span class="light-block-name">${name.charAt(0).toUpperCase() + name.slice(1)}</span>`;
  block.appendChild(header);

  // Type selector
  const typeRow = document.createElement('div');
  typeRow.className = 'ctrl-row';
  const typeLbl = document.createElement('span');
  typeLbl.className = 'ctrl-label';
  typeLbl.textContent = 'Type';
  typeRow.appendChild(typeLbl);
  const typeBtns = document.createElement('div');
  typeBtns.className = 'type-btns';
  ['Point', 'Directional', 'Spot'].forEach(type => {
    const btn = document.createElement('button');
    btn.className = 'type-btn' + (cfg.type === type ? ' active' : '');
    btn.textContent = type;
    btn.addEventListener('click', () => {
      typeBtns.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      STATE.lights[name].type = type;
      createLight(name, STATE.lights[name]);
      if (helperStates[name]) toggleHelper(name, true);
      updatePrompt();
    });
    typeBtns.appendChild(btn);
  });
  typeRow.appendChild(typeBtns);
  block.appendChild(typeRow);

  // Color
  const colorCtrl = makeColor('Color', cfg.color, v => {
    STATE.lights[name].color = v;
    lights[name].color.set(v);
  });
  block.appendChild(colorCtrl.row);

  // Intensity
  const intCtrl = makeSlider('Intensity', 0, 10, 0.1, cfg.intensity, v => {
    STATE.lights[name].intensity = v;
    lights[name].intensity = v;
  });
  block.appendChild(intCtrl.row);

  // Position X
  const xCtrl = makeSlider('Pos X', -15, 15, 0.1, cfg.x, v => {
    STATE.lights[name].x = v;
    lights[name].position.x = v;
  });
  block.appendChild(xCtrl.row);

  // Position Y
  const yCtrl = makeSlider('Pos Y', -15, 15, 0.1, cfg.y, v => {
    STATE.lights[name].y = v;
    lights[name].position.y = v;
  });
  block.appendChild(yCtrl.row);

  // Position Z
  const zCtrl = makeSlider('Pos Z', -15, 15, 0.1, cfg.z, v => {
    STATE.lights[name].z = v;
    lights[name].position.z = v;
  });
  block.appendChild(zCtrl.row);

  // Show helper toggle
  const helperCtrl = makeToggle('Helper', false, v => {
    helperStates[name] = v;
    toggleHelper(name, v);
  });
  block.appendChild(helperCtrl.row);

  lightEl.appendChild(block);
  lightUIRefs[name] = { colorCtrl, intCtrl, xCtrl, yCtrl, zCtrl, typeBtns };
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MATERIAL CONTROLS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const matEl = document.getElementById('mat-controls');
const matUIRefs = {};

const matTexMap = {
  crimson: { map: textures.redMap, norm: textures.redNorm },
  navy: { map: textures.blueMap, norm: textures.blueNorm },
  gunmetal: { map: textures.darkMap, norm: textures.greebleNorm },
};

Object.entries(STATE.materials).forEach(([name, cfg]) => {
  const mat = mats[name];
  const block = document.createElement('div');
  block.className = 'mat-block';
  block.innerHTML = `<div class="mat-block-header">${name.charAt(0).toUpperCase() + name.slice(1)}</div>`;

  const colorCtrl = makeColor('Color', cfg.color, v => {
    STATE.materials[name].color = v;
    mat.color.set(v);
  });
  block.appendChild(colorCtrl.row);

  const metCtrl = makeSlider('Metalness', 0, 1, 0.01, cfg.metalness, v => {
    STATE.materials[name].metalness = v;
    mat.metalness = v;
  });
  block.appendChild(metCtrl.row);

  const roughCtrl = makeSlider('Roughness', 0, 1, 0.01, cfg.roughness, v => {
    STATE.materials[name].roughness = v;
    mat.roughness = v;
  });
  block.appendChild(roughCtrl.row);

  const ccCtrl = makeSlider('Clearcoat', 0, 1, 0.01, cfg.clearcoat, v => {
    STATE.materials[name].clearcoat = v;
    mat.clearcoat = v;
  });
  block.appendChild(ccCtrl.row);

  // Normal map section
  const normHeader = document.createElement('div');
  normHeader.className = 'sub-header';
  normHeader.textContent = 'Normal Map';
  block.appendChild(normHeader);

  const normStrCtrl = makeSlider('Strength', 0, 3, 0.01, cfg.normalStrength, v => {
    STATE.materials[name].normalStrength = v;
    if (mat.normalMap) mat.normalScale.set(v, v);
  });
  block.appendChild(normStrCtrl.row);

  const normToggle = makeToggle('Enabled', cfg.normalEnabled, v => {
    STATE.materials[name].normalEnabled = v;
    if (v && matTexMap[name].norm) {
      mat.normalMap = matTexMap[name].norm;
      mat.normalScale.set(STATE.materials[name].normalStrength, STATE.materials[name].normalStrength);
    } else {
      mat.normalMap = null;
    }
    mat.needsUpdate = true;
  });
  block.appendChild(normToggle.row);

  // Texture section
  const texHeader = document.createElement('div');
  texHeader.className = 'sub-header';
  texHeader.textContent = 'Texture';
  block.appendChild(texHeader);

  const txCtrl = makeSlider('Tile X', 0.05, 5, 0.01, cfg.texTileX, v => {
    STATE.materials[name].texTileX = v;
    if (mat.map) mat.map.repeat.x = v;
    if (mat.normalMap) mat.normalMap.repeat.x = v;
  });
  block.appendChild(txCtrl.row);

  const tyCtrl = makeSlider('Tile Y', 0.05, 5, 0.01, cfg.texTileY, v => {
    STATE.materials[name].texTileY = v;
    if (mat.map) mat.map.repeat.y = v;
    if (mat.normalMap) mat.normalMap.repeat.y = v;
  });
  block.appendChild(tyCtrl.row);

  const oxCtrl = makeSlider('Offset X', 0, 1, 0.01, cfg.texOffX, v => {
    STATE.materials[name].texOffX = v;
    if (mat.map) mat.map.offset.x = v;
    if (mat.normalMap) mat.normalMap.offset.x = v;
  });
  block.appendChild(oxCtrl.row);

  const oyCtrl = makeSlider('Offset Y', 0, 1, 0.01, cfg.texOffY, v => {
    STATE.materials[name].texOffY = v;
    if (mat.map) mat.map.offset.y = v;
    if (mat.normalMap) mat.normalMap.offset.y = v;
  });
  block.appendChild(oyCtrl.row);

  const texToggle = makeToggle('Enabled', cfg.texEnabled, v => {
    STATE.materials[name].texEnabled = v;
    if (v) {
      mat.map = matTexMap[name].map;
      mat.map.repeat.set(STATE.materials[name].texTileX, STATE.materials[name].texTileY);
      mat.map.offset.set(STATE.materials[name].texOffX, STATE.materials[name].texOffY);
    } else {
      mat.map = null;
    }
    mat.needsUpdate = true;
  });
  block.appendChild(texToggle.row);

  matEl.appendChild(block);
  matUIRefs[name] = { colorCtrl, metCtrl, roughCtrl, ccCtrl, normStrCtrl, normToggle, txCtrl, tyCtrl, oxCtrl, oyCtrl, texToggle };
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// GLOW CONTROLS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const glowEl = document.getElementById('glow-controls');

const ledColorCtrl = makeColor('LED Color', STATE.glow.ledColor, v => {
  STATE.glow.ledColor = v;
  mats.ledGlow.color.set(v);
  glowMeshes.forEach(g => g.material.color.set(v));
});
glowEl.appendChild(ledColorCtrl.row);

const ledOpCtrl = makeSlider('LED Opacity', 0, 1, 0.01, STATE.glow.ledOpacity, v => {
  STATE.glow.ledOpacity = v;
});
glowEl.appendChild(ledOpCtrl.row);

const orColorCtrl = makeColor('Orange Color', STATE.glow.orangeColor, v => {
  STATE.glow.orangeColor = v;
  mats.orangeGlow.color.set(v);
  orangeMeshes.forEach(g => g.material.color.set(v));
});
glowEl.appendChild(orColorCtrl.row);

const orOpCtrl = makeSlider('Orange Opacity', 0, 1, 0.01, STATE.glow.orangeOpacity, v => {
  STATE.glow.orangeOpacity = v;
});
glowEl.appendChild(orOpCtrl.row);

const pulseSpeedCtrl = makeSlider('Pulse Speed', 0, 10, 0.1, STATE.glow.pulseSpeed, v => {
  STATE.glow.pulseSpeed = v;
});
glowEl.appendChild(pulseSpeedCtrl.row);

const pulseMinCtrl = makeSlider('Pulse Min', 0, 1, 0.01, STATE.glow.pulseMin, v => {
  STATE.glow.pulseMin = v;
});
glowEl.appendChild(pulseMinCtrl.row);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ANIMATION BUTTONS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.getElementById('anim-play').addEventListener('click', playAnimation);
document.getElementById('anim-reset').addEventListener('click', resetToFinal);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PRESETS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.getElementById('preset-apply').addEventListener('click', () => {
  const presetName = document.getElementById('preset-select').value;
  const preset = PRESETS[presetName];
  if (!preset) return;

  // Apply scene
  STATE.exposure = preset.exposure;
  STATE.ambient = preset.ambient;
  STATE.background = preset.background;
  scene.background = new THREE.Color(preset.background);
  rendererPreview.toneMappingExposure = preset.exposure;
  rendererInspect.toneMappingExposure = preset.exposure;
  ambientLight.intensity = preset.ambient;

  // Update scene UI
  bgCtrl.input.value = preset.background;
  expCtrl.slider.value = preset.exposure;
  expCtrl.val.textContent = preset.exposure.toFixed(2);
  ambSlider.slider.value = preset.ambient;
  ambSlider.val.textContent = preset.ambient.toFixed(3);

  // Apply lights
  Object.entries(preset.lights).forEach(([name, cfg]) => {
    STATE.lights[name] = { ...cfg };
    createLight(name, cfg);
    if (helperStates[name]) toggleHelper(name, true);

    // Update light UI
    const ui = lightUIRefs[name];
    if (ui) {
      ui.colorCtrl.input.value = cfg.color;
      ui.intCtrl.slider.value = cfg.intensity;
      ui.intCtrl.val.textContent = cfg.intensity.toFixed(1);
      ui.xCtrl.slider.value = cfg.x;
      ui.xCtrl.val.textContent = cfg.x.toFixed(1);
      ui.yCtrl.slider.value = cfg.y;
      ui.yCtrl.val.textContent = cfg.y.toFixed(1);
      ui.zCtrl.slider.value = cfg.z;
      ui.zCtrl.val.textContent = cfg.z.toFixed(1);
      ui.typeBtns.querySelectorAll('.type-btn').forEach(b => {
        b.classList.toggle('active', b.textContent === cfg.type);
      });
    }
  });

  // Apply materials
  if (preset.materials) {
    Object.entries(preset.materials).forEach(([name, cfg]) => {
      STATE.materials[name] = { ...cfg };
      const mat = mats[name];
      mat.color.set(cfg.color);
      mat.metalness = cfg.metalness;
      mat.roughness = cfg.roughness;
      mat.clearcoat = cfg.clearcoat;
      if (mat.normalMap) mat.normalScale.set(cfg.normalStrength, cfg.normalStrength);

      // Texture tiling
      if (mat.map) {
        mat.map.repeat.set(cfg.texTileX, cfg.texTileY);
        mat.map.offset.set(cfg.texOffX || 0, cfg.texOffY || 0);
      }
      if (mat.normalMap) {
        mat.normalMap.repeat.set(cfg.texTileX, cfg.texTileY);
        mat.normalMap.offset.set(cfg.texOffX || 0, cfg.texOffY || 0);
      }

      // Texture enabled/disabled
      if (!cfg.texEnabled && mat.map) {
        mat.map = null;
        mat.needsUpdate = true;
      } else if (cfg.texEnabled && !mat.map) {
        mat.map = matTexMap[name].map;
        mat.needsUpdate = true;
      }
      if (!cfg.normalEnabled && mat.normalMap) {
        mat.normalMap = null;
        mat.needsUpdate = true;
      } else if (cfg.normalEnabled && !mat.normalMap) {
        mat.normalMap = matTexMap[name].norm;
        mat.needsUpdate = true;
      }

      // Update material UI
      const ui = matUIRefs[name];
      if (ui) {
        ui.colorCtrl.input.value = cfg.color;
        ui.metCtrl.slider.value = cfg.metalness;
        ui.metCtrl.val.textContent = cfg.metalness.toFixed(2);
        ui.roughCtrl.slider.value = cfg.roughness;
        ui.roughCtrl.val.textContent = cfg.roughness.toFixed(2);
        ui.ccCtrl.slider.value = cfg.clearcoat;
        ui.ccCtrl.val.textContent = cfg.clearcoat.toFixed(2);
        ui.normStrCtrl.slider.value = cfg.normalStrength;
        ui.normStrCtrl.val.textContent = cfg.normalStrength.toFixed(2);
        ui.txCtrl.slider.value = cfg.texTileX;
        ui.txCtrl.val.textContent = cfg.texTileX.toFixed(2);
        ui.tyCtrl.slider.value = cfg.texTileY;
        ui.tyCtrl.val.textContent = cfg.texTileY.toFixed(2);
        ui.oxCtrl.slider.value = cfg.texOffX || 0;
        ui.oxCtrl.val.textContent = (cfg.texOffX || 0).toFixed(2);
        ui.oyCtrl.slider.value = cfg.texOffY || 0;
        ui.oyCtrl.val.textContent = (cfg.texOffY || 0).toFixed(2);
        ui.normToggle.toggle.classList.toggle('on', cfg.normalEnabled);
        ui.texToggle.toggle.classList.toggle('on', cfg.texEnabled);
      }
    });
  }

  // Apply glow
  if (preset.glow) {
    Object.assign(STATE.glow, preset.glow);
    mats.ledGlow.color.set(preset.glow.ledColor);
    glowMeshes.forEach(g => g.material.color.set(preset.glow.ledColor));
    mats.orangeGlow.color.set(preset.glow.orangeColor);
    orangeMeshes.forEach(g => g.material.color.set(preset.glow.orangeColor));

    // Update glow UI
    ledColorCtrl.input.value = preset.glow.ledColor;
    ledOpCtrl.slider.value = preset.glow.ledOpacity;
    ledOpCtrl.val.textContent = preset.glow.ledOpacity.toFixed(2);
    orColorCtrl.input.value = preset.glow.orangeColor;
    orOpCtrl.slider.value = preset.glow.orangeOpacity;
    orOpCtrl.val.textContent = preset.glow.orangeOpacity.toFixed(2);
    pulseSpeedCtrl.slider.value = preset.glow.pulseSpeed;
    pulseSpeedCtrl.val.textContent = preset.glow.pulseSpeed.toFixed(1);
    pulseMinCtrl.slider.value = preset.glow.pulseMin;
    pulseMinCtrl.val.textContent = preset.glow.pulseMin.toFixed(2);
  }

  updatePrompt();
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PROMPT OUTPUT — only shows changed values
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const promptEl = document.getElementById('prompt-output');

function colorToHex(c) {
  // Already hex string like #ff0000
  if (typeof c === 'string' && c.startsWith('#')) return '0x' + c.slice(1);
  return c;
}

function updatePrompt() {
  const def = DEFAULTS;
  const changes = [];

  // Scene
  if (STATE.exposure !== def.exposure) changes.push(`exposure: ${STATE.exposure.toFixed(2)}`);
  if (STATE.ambient !== def.ambient) changes.push(`ambient: ${STATE.ambient.toFixed(3)}`);
  if (STATE.background !== def.background) changes.push(`background: ${colorToHex(STATE.background)}`);

  // Lights
  Object.entries(STATE.lights).forEach(([name, cfg]) => {
    const d = def.lights[name];
    const diffs = [];
    if (cfg.type !== d.type) diffs.push(`type: ${cfg.type}Light`);
    if (cfg.color !== d.color) diffs.push(`color: ${colorToHex(cfg.color)}`);
    if (cfg.intensity !== d.intensity) diffs.push(`intensity: ${cfg.intensity.toFixed(1)}`);
    if (cfg.x !== d.x) diffs.push(`x: ${cfg.x.toFixed(1)}`);
    if (cfg.y !== d.y) diffs.push(`y: ${cfg.y.toFixed(1)}`);
    if (cfg.z !== d.z) diffs.push(`z: ${cfg.z.toFixed(1)}`);
    if (diffs.length) changes.push(`${name}: { ${diffs.join(', ')} }`);
  });

  // Materials
  Object.entries(STATE.materials).forEach(([name, cfg]) => {
    const d = def.materials[name];
    const diffs = [];
    if (cfg.color !== d.color) diffs.push(`color: ${colorToHex(cfg.color)}`);
    if (cfg.metalness !== d.metalness) diffs.push(`metalness: ${cfg.metalness.toFixed(2)}`);
    if (cfg.roughness !== d.roughness) diffs.push(`roughness: ${cfg.roughness.toFixed(2)}`);
    if (cfg.clearcoat !== d.clearcoat) diffs.push(`clearcoat: ${cfg.clearcoat.toFixed(2)}`);
    if (cfg.normalStrength !== d.normalStrength) diffs.push(`normalScale: (${cfg.normalStrength.toFixed(1)}, ${cfg.normalStrength.toFixed(1)})`);
    if (cfg.normalEnabled !== d.normalEnabled) diffs.push(`normalMap: ${cfg.normalEnabled ? 'enabled' : 'disabled'}`);
    if (cfg.texTileX !== d.texTileX) diffs.push(`texTileX: ${cfg.texTileX.toFixed(2)}`);
    if (cfg.texTileY !== d.texTileY) diffs.push(`texTileY: ${cfg.texTileY.toFixed(2)}`);
    if (cfg.texOffX !== d.texOffX) diffs.push(`texOffX: ${cfg.texOffX.toFixed(2)}`);
    if (cfg.texOffY !== d.texOffY) diffs.push(`texOffY: ${cfg.texOffY.toFixed(2)}`);
    if (cfg.texEnabled !== d.texEnabled) diffs.push(`texture: ${cfg.texEnabled ? 'enabled' : 'disabled'}`);
    if (diffs.length) changes.push(`${name}: { ${diffs.join(', ')} }`);
  });

  // Glow
  const gd = def.glow;
  const glowDiffs = [];
  if (STATE.glow.ledColor !== gd.ledColor) glowDiffs.push(`ledColor: ${colorToHex(STATE.glow.ledColor)}`);
  if (STATE.glow.ledOpacity !== gd.ledOpacity) glowDiffs.push(`ledOpacity: ${STATE.glow.ledOpacity.toFixed(2)}`);
  if (STATE.glow.orangeColor !== gd.orangeColor) glowDiffs.push(`orangeColor: ${colorToHex(STATE.glow.orangeColor)}`);
  if (STATE.glow.orangeOpacity !== gd.orangeOpacity) glowDiffs.push(`orangeOpacity: ${STATE.glow.orangeOpacity.toFixed(2)}`);
  if (STATE.glow.pulseSpeed !== gd.pulseSpeed) glowDiffs.push(`pulseSpeed: ${STATE.glow.pulseSpeed.toFixed(1)}`);
  if (STATE.glow.pulseMin !== gd.pulseMin) glowDiffs.push(`pulseMin: ${STATE.glow.pulseMin.toFixed(2)}`);
  if (glowDiffs.length) changes.push(`glow: { ${glowDiffs.join(', ')} }`);

  if (changes.length === 0) {
    promptEl.textContent = 'No changes yet.';
  } else {
    promptEl.textContent = `Update TransformPlayer.jsx with these values:\n${changes.join('\n')}`;
  }
}

// Copy button
document.getElementById('copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(promptEl.textContent).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  });
});

// Initial prompt
updatePrompt();
</script>
