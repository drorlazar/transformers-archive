<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransformPlayer 3D Editor</title>
<script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
  }
}
</script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background:#111; color:#ccc; font-size:12px; }

/* Layout */
#app { display:flex; height:100vh; flex-direction:column; }
#main { display:flex; flex:1; min-height:0; }
#panel { width:380px; min-width:380px; background:#1a1a22; overflow-y:auto; border-right:1px solid #333; display:flex; flex-direction:column; }
#viewport { flex:1; position:relative; background:#060610; }
#viewport canvas { width:100%; height:100%; display:block; }
#fps { position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.7); color:#0f0; padding:3px 8px; border-radius:4px; font:12px monospace; z-index:10; }
#bottom-bar { background:#141420; border-top:1px solid #333; padding:8px 12px; display:flex; align-items:flex-start; gap:10px; max-height:180px; }
#prompt-output { flex:1; font:11px/1.5 'Fira Code', 'Consolas', monospace; color:#8f8; background:#0a0a14; border:1px solid #333; border-radius:4px; padding:8px; overflow-y:auto; max-height:160px; white-space:pre-wrap; }
#copy-btn { background:#2a6; color:#fff; border:none; padding:6px 16px; border-radius:4px; cursor:pointer; font-weight:600; white-space:nowrap; }
#copy-btn:hover { background:#3b7; }

/* Panel styles */
.panel-header { padding:10px 14px; background:#0d0d18; border-bottom:1px solid #333; display:flex; align-items:center; justify-content:space-between; }
.panel-header h1 { font-size:14px; color:#eee; font-weight:700; letter-spacing:0.5px; }
.section { border-bottom:1px solid #282830; }
.section-head { display:flex; align-items:center; justify-content:space-between; padding:8px 14px; cursor:pointer; user-select:none; background:#16161e; }
.section-head:hover { background:#1e1e28; }
.section-head h2 { font-size:12px; font-weight:600; color:#aab; text-transform:uppercase; letter-spacing:0.8px; }
.section-head .arrow { color:#667; font-size:10px; transition:transform 0.2s; }
.section-head.collapsed .arrow { transform:rotate(-90deg); }
.section-body { padding:8px 14px 12px; }
.section-body.hidden { display:none; }

/* Controls */
.ctrl-row { display:flex; align-items:center; gap:6px; margin-bottom:5px; min-height:24px; }
.ctrl-row label { width:90px; font-size:11px; color:#889; flex-shrink:0; text-align:right; padding-right:6px; }
.ctrl-row input[type=range] { flex:1; height:3px; accent-color:#4af; cursor:pointer; }
.ctrl-row input[type=color] { width:32px; height:22px; border:1px solid #444; border-radius:3px; padding:0; cursor:pointer; background:#222; }
.ctrl-row input[type=number] { width:58px; background:#111; border:1px solid #444; color:#ccc; border-radius:3px; padding:2px 4px; font-size:11px; }
.ctrl-row .val { width:42px; text-align:right; font:11px monospace; color:#8af; flex-shrink:0; }
.ctrl-row select { background:#111; border:1px solid #444; color:#ccc; border-radius:3px; padding:2px 4px; font-size:11px; flex:1; }
.ctrl-row input[type=checkbox] { accent-color:#4af; }

.light-group { background:#12121a; border:1px solid #282830; border-radius:4px; margin-bottom:8px; padding:8px 10px; }
.light-group h3 { font-size:11px; font-weight:600; color:#9af; margin-bottom:6px; display:flex; align-items:center; justify-content:space-between; }
.light-group h3 button { background:#335; color:#8af; border:1px solid #446; border-radius:3px; padding:2px 8px; cursor:pointer; font-size:10px; }
.light-group h3 button:hover { background:#446; }

.btn-row { display:flex; gap:6px; margin-top:6px; }
.btn { background:#335; color:#aaf; border:1px solid #446; border-radius:4px; padding:5px 12px; cursor:pointer; font-size:11px; font-weight:600; }
.btn:hover { background:#446; }
.btn.play { background:#253; color:#6f8; border-color:#364; }
.btn.play:hover { background:#364; }
.btn.stop { background:#422; color:#f88; border-color:#644; }
.btn.stop:hover { background:#533; }

.mat-group { background:#12121a; border:1px solid #282830; border-radius:4px; margin-bottom:8px; padding:8px 10px; }
.mat-group h3 { font-size:11px; font-weight:600; margin-bottom:6px; }
.mat-group.crimson h3 { color:#ca2f47; }
.mat-group.navy h3 { color:#5566cc; }
.mat-group.gunmetal h3 { color:#8888aa; }
</style>
</head>
<body>
<div id="app">
  <div id="main">
    <!-- LEFT PANEL -->
    <div id="panel">
      <div class="panel-header">
        <h1>TransformPlayer Editor</h1>
      </div>

      <!-- DEBUG -->
      <div class="section">
        <div class="section-head" data-section="debug">
          <h2>Debug / Helpers</h2><span class="arrow">&#9660;</span>
        </div>
        <div class="section-body" id="sec-debug">
          <div class="ctrl-row"><label>Light Helpers</label><input type="checkbox" id="chk-helpers"><span class="val" id="val-helpers">off</span></div>
          <div class="ctrl-row"><label>Grid</label><input type="checkbox" id="chk-grid" checked><span class="val" id="val-grid">on</span></div>
          <div class="ctrl-row"><label>Axes</label><input type="checkbox" id="chk-axes" checked><span class="val" id="val-axes">on</span></div>
        </div>
      </div>

      <!-- CAMERA & SCENE -->
      <div class="section">
        <div class="section-head" data-section="camera">
          <h2>Camera &amp; Scene</h2><span class="arrow">&#9660;</span>
        </div>
        <div class="section-body" id="sec-camera">
          <div class="ctrl-row"><label>FOV</label><input type="range" id="sl-fov" min="15" max="120" step="1" value="45"><span class="val" id="val-fov">45</span></div>
          <div class="ctrl-row"><label>Exposure</label><input type="range" id="sl-exposure" min="0.1" max="5" step="0.01" value="1.84"><span class="val" id="val-exposure">1.84</span></div>
          <div class="ctrl-row"><label>Background</label><input type="color" id="col-bg" value="#060610"></div>
        </div>
      </div>

      <!-- LIGHTS -->
      <div class="section">
        <div class="section-head" data-section="lights">
          <h2>Lights</h2><span class="arrow">&#9660;</span>
        </div>
        <div class="section-body" id="sec-lights">
        </div>
      </div>

      <!-- MATERIALS -->
      <div class="section">
        <div class="section-head" data-section="materials">
          <h2>Materials</h2><span class="arrow">&#9660;</span>
        </div>
        <div class="section-body" id="sec-materials">
        </div>
      </div>

      <!-- GLOW -->
      <div class="section">
        <div class="section-head" data-section="glow">
          <h2>Glow Controls</h2><span class="arrow">&#9660;</span>
        </div>
        <div class="section-body" id="sec-glow">
        </div>
      </div>

      <!-- ANIMATION -->
      <div class="section">
        <div class="section-head" data-section="anim">
          <h2>Animation</h2><span class="arrow">&#9660;</span>
        </div>
        <div class="section-body" id="sec-anim">
          <div class="btn-row">
            <button class="btn play" id="btn-play">&#9654; Play</button>
            <button class="btn stop" id="btn-reset">&#9632; Reset</button>
          </div>
        </div>
      </div>

      <!-- GEOMETRY (prompt-only) -->
      <div class="section">
        <div class="section-head" data-section="geo">
          <h2>Geometry (Prompt Only)</h2><span class="arrow">&#9660;</span>
        </div>
        <div class="section-body" id="sec-geo">
          <div class="ctrl-row"><label>Cube Size</label><input type="number" id="num-cs" step="0.01" value="0.68"><span class="val">cs</span></div>
          <div class="ctrl-row"><label>Frame W</label><input type="number" id="num-fw" step="0.1" value="7.5"><span class="val">fw</span></div>
          <div class="ctrl-row"><label>Frame H</label><input type="number" id="num-fh" step="0.1" value="4.6"><span class="val">fh</span></div>
          <div class="ctrl-row"><label>Bar W</label><input type="number" id="num-bw" step="0.01" value="0.4"><span class="val">bw</span></div>
          <div class="ctrl-row"><label>Bar D</label><input type="number" id="num-bd" step="0.01" value="0.45"><span class="val">bd</span></div>
          <div class="ctrl-row"><label>Bevel</label><input type="number" id="num-bevel" step="0.01" value="0.08"><span class="val">bv</span></div>
        </div>
      </div>
    </div>

    <!-- VIEWPORT -->
    <div id="viewport">
      <canvas id="three-canvas"></canvas>
      <div id="fps">-- FPS</div>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bottom-bar">
    <pre id="prompt-output">Adjust values to see prompt output here...</pre>
    <button id="copy-btn">Copy</button>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';

// ============================
// DEFAULTS — match TransformPlayer.jsx exactly
// ============================
const DEFAULTS = {
  fov: 45,
  exposure: 1.84,
  background: '#060610',
  lights: {
    key:  { type:'Directional', color:'#ffeedd', intensity:2.6, x:5, y:6, z:8, angle:0.52, penumbra:0.5 },
    fill: { type:'Directional', color:'#3355aa', intensity:5.9, x:-6, y:3, z:5, angle:0.52, penumbra:0.5 },
    rim:  { type:'Directional', color:'#ff6633', intensity:1.9, x:0, y:-5, z:6, angle:0.52, penumbra:0.5 },
    orb1: { type:'Point', color:'#ff3300', intensity:1.0, x:11, y:4, z:8, angle:0.52, penumbra:0.5 },
    orb2: { type:'Point', color:'#0044ff', intensity:0.8, x:-11, y:-4, z:8, angle:0.52, penumbra:0.5 },
  },
  materials: {
    crimson:  { color:'#ca2f47', metalness:0.96, roughness:0.32, clearcoat:0.67, normalStrength:0.8, tilingX:0.8, tilingY:0.8 },
    navy:     { color:'#2a3090', metalness:0.62, roughness:0.31, clearcoat:0.50, normalStrength:0.7, tilingX:0.7, tilingY:1.0 },
    gunmetal: { color:'#2a2a38', metalness:0.95, roughness:0.08, clearcoat:0.30, normalStrength:0.5, tilingX:1.0, tilingY:1.0 },
  },
  glow: {
    ledColor:'#22aaff', ledOpacity:1.0,
    orangeColor:'#ff6600', orangeOpacity:0.7,
    pulseSpeed:1.8, pulseMin:0.3, pulseMax:1.0,
  },
  geometry: { cs:0.68, fw:7.5, fh:4.6, bw:0.4, bd:0.45, bevel:0.08 },
};

const state = JSON.parse(JSON.stringify(DEFAULTS));

// ============================
// THREE.JS SETUP
// ============================
const canvas = document.getElementById('three-canvas');
const viewportEl = document.getElementById('viewport');
let W = viewportEl.clientWidth, H = viewportEl.clientHeight;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = state.exposure;

const scene = new THREE.Scene();
scene.background = new THREE.Color(state.background);

const camera = new THREE.PerspectiveCamera(state.fov, W / H, 0.1, 100);
camera.position.set(0, 0, 9);

const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.08;

const transformControls = new TransformControls(camera, renderer.domElement);
transformControls.addEventListener('dragging-changed', (e) => {
  orbitControls.enabled = !e.value;
});
transformControls.addEventListener('objectChange', () => {
  const obj = transformControls.object;
  if (obj && obj.userData.lightKey) {
    const k = obj.userData.lightKey;
    state.lights[k].x = +obj.position.x.toFixed(2);
    state.lights[k].y = +obj.position.y.toFixed(2);
    state.lights[k].z = +obj.position.z.toFixed(2);
    updateLightUI(k);
    updateHelpers();
    updatePrompt();
  }
});
scene.add(transformControls);

// ============================
// ENVIRONMENT MAP
// ============================
const pmrem = new THREE.PMREMGenerator(renderer);
const envScene = new THREE.Scene();
envScene.add(new THREE.HemisphereLight(0x7799cc, 0x443322, 3.5));
const ep1 = new THREE.PointLight(0xff4400, 2, 30); ep1.position.set(8, 5, 8); envScene.add(ep1);
const ep2 = new THREE.PointLight(0x0044cc, 1.5, 30); ep2.position.set(-8, -3, 8); envScene.add(ep2);
scene.environment = pmrem.fromScene(envScene, 0.04).texture;
pmrem.dispose();

// ============================
// HELPERS
// ============================
const gridHelper = new THREE.GridHelper(20, 20, 0x333340, 0x222230);
gridHelper.rotation.x = Math.PI / 2;
scene.add(gridHelper);

const axesHelper = new THREE.AxesHelper(3);
scene.add(axesHelper);

// ============================
// TEXTURES
// ============================
const loader = new THREE.TextureLoader();
function loadTex(path, rx = 1, ry = 1) {
  const tex = loader.load(path, undefined, undefined, () => {});
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.repeat.set(rx, ry);
  return tex;
}

const basePath = '../public/textures/';
const redTex = loadTex(basePath + 'red-metal.jpg', 0.8, 0.8);
const blueTex = loadTex(basePath + 'blue-metal.jpg', 0.7, 1.0);
const darkTex = loadTex(basePath + 'dark-metal.jpg', 1.0, 1.0);
let redNorm = null, blueNorm = null, greebleNorm = null;
try {
  redNorm = loadTex(basePath + 'red-normal.jpg', 0.8, 0.8);
  blueNorm = loadTex(basePath + 'blue-normal.jpg', 0.7, 1.0);
  greebleNorm = loadTex(basePath + 'greeble-normal.jpg', 1.5, 1.5);
} catch(e) {}

// ============================
// MATERIALS
// ============================
const crimson = new THREE.MeshPhysicalMaterial({
  color: 0xca2f47, map: redTex, normalMap: redNorm, normalScale: new THREE.Vector2(0.8, 0.8),
  metalness: 0.96, roughness: 0.32, clearcoat: 0.67, clearcoatRoughness: 0.06,
});
const navy = new THREE.MeshPhysicalMaterial({
  color: 0x2a3090, map: blueTex, normalMap: blueNorm, normalScale: new THREE.Vector2(0.7, 0.7),
  metalness: 0.62, roughness: 0.31, clearcoat: 0.5, clearcoatRoughness: 0.08,
});
const gunmetal = new THREE.MeshPhysicalMaterial({
  color: 0x2a2a38, map: darkTex, normalMap: greebleNorm, normalScale: new THREE.Vector2(0.5, 0.5),
  metalness: 0.95, roughness: 0.08, clearcoat: 0.3,
});
const chrome = new THREE.MeshPhysicalMaterial({
  color: 0xbbbbcc, metalness: 1.0, roughness: 0.03, clearcoat: 1.0, clearcoatRoughness: 0.01,
});
const steel = new THREE.MeshPhysicalMaterial({
  color: 0x607080, metalness: 0.95, roughness: 0.1, clearcoat: 0.4,
});
const greebMat = new THREE.MeshPhysicalMaterial({
  color: 0x444455, metalness: 0.9, roughness: 0.15, clearcoat: 0.3,
});
const ledGlow = new THREE.MeshBasicMaterial({ color: 0x22aaff, transparent: true, opacity: 1.0 });
const orangeGlow = new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.7 });

const matMap = { crimson, navy, gunmetal };
const texMap = {
  crimson: { color: redTex, normal: redNorm },
  navy: { color: blueTex, normal: blueNorm },
  gunmetal: { color: darkTex, normal: greebleNorm },
};

// ============================
// GEOMETRY HELPERS
// ============================
function bevelBox(w, h, d, bevel = 0.07) {
  const shape = new THREE.Shape();
  const hw = w / 2 - bevel, hh = h / 2 - bevel;
  shape.moveTo(-hw, -h / 2);
  shape.lineTo(hw, -h / 2);
  shape.lineTo(w / 2, -hh);
  shape.lineTo(w / 2, hh);
  shape.lineTo(hw, h / 2);
  shape.lineTo(-hw, h / 2);
  shape.lineTo(-w / 2, hh);
  shape.lineTo(-w / 2, -hh);
  shape.closePath();
  return new THREE.ExtrudeGeometry(shape, {
    depth: d, bevelEnabled: true,
    bevelThickness: bevel * 0.8, bevelSize: bevel * 0.8, bevelSegments: 3,
  });
}

function makeGearGeo(outerR, innerR, teeth, thickness) {
  const shape = new THREE.Shape();
  const steps = teeth * 2;
  for (let i = 0; i < steps; i++) {
    const a = (i / steps) * Math.PI * 2;
    const r = i % 2 === 0 ? outerR : innerR;
    if (i === 0) shape.moveTo(Math.cos(a) * r, Math.sin(a) * r);
    else shape.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  shape.closePath();
  const hole = new THREE.Path();
  for (let i = 0; i < 16; i++) {
    const a = (i / 16) * Math.PI * 2;
    if (i === 0) hole.moveTo(Math.cos(a) * innerR * 0.35, Math.sin(a) * innerR * 0.35);
    else hole.lineTo(Math.cos(a) * innerR * 0.35, Math.sin(a) * innerR * 0.35);
  }
  shape.holes.push(hole);
  return new THREE.ExtrudeGeometry(shape, {
    depth: thickness, bevelEnabled: true,
    bevelThickness: 0.012, bevelSize: 0.012, bevelSegments: 2,
  });
}

function addGreebleStrip(parent, x, y, z, length, vertical, mat) {
  const count = Math.floor(length / 0.25);
  for (let i = 0; i < count; i++) {
    const type = Math.random();
    let geo;
    if (type < 0.3) geo = new THREE.CylinderGeometry(0.035, 0.035, 0.05, 6);
    else if (type < 0.6) geo = new THREE.BoxGeometry(0.12, 0.04, 0.04);
    else if (type < 0.8) geo = new THREE.CylinderGeometry(0.02, 0.02, 0.15, 6);
    else geo = new THREE.SphereGeometry(0.025, 6, 4);
    const mesh = new THREE.Mesh(geo, mat);
    const offset = -length / 2 + (i + 0.5) * (length / count);
    if (vertical) {
      mesh.position.set(x, y + offset, z);
      if (type >= 0.6 && type < 0.8) mesh.rotation.z = Math.PI / 2;
    } else {
      mesh.position.set(x + offset, y, z);
    }
    if (type < 0.3) mesh.rotation.x = Math.PI / 2;
    parent.add(mesh);
  }
}

// ============================
// BUILD SCENE — ASSEMBLED STATE
// ============================
const frameW = 7.5, frameH = 4.6, barW = 0.4, barD = 0.45;
const cs = 0.68;

const pieces = [];
function addPiece(geo, mat, sPos, sRot, sScale, midPos, midRot, midScale, ePos, eRot, eScale) {
  geo.computeBoundingBox();
  const bb = geo.boundingBox;
  geo.translate(-(bb.max.x + bb.min.x) / 2, -(bb.max.y + bb.min.y) / 2, -(bb.max.z + bb.min.z) / 2);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(ePos[0], ePos[1], ePos[2]);
  mesh.rotation.set(eRot[0], eRot[1], eRot[2]);
  mesh.scale.set(eScale[0], eScale[1], eScale[2]);
  scene.add(mesh);
  pieces.push({
    mesh,
    start: { p: [...sPos], r: [...sRot], s: [...sScale] },
    mid: { p: midPos, r: midRot, s: midScale },
    end: { p: ePos, r: eRot, s: eScale },
  });
  return mesh;
}

// Top bar
addPiece(bevelBox(frameW, barW, barD, 0.08), crimson,
  [0, cs * 0.4, 0], [0, 0, 0], [cs / frameW, 0.8, cs / barD * 0.5],
  [0, cs * 1.2, 0.3], [0.15, 0, 0], [cs / frameW * 2, 1, cs / barD * 0.7],
  [0, frameH / 2 - barW / 2, 0], [0, 0, 0], [1, 1, 1]);

// Bottom bar
addPiece(bevelBox(frameW, barW, barD, 0.08), crimson,
  [0, -cs * 0.4, 0], [0, 0, 0], [cs / frameW, 0.8, cs / barD * 0.5],
  [0, -cs * 1.2, 0.3], [-0.15, 0, 0], [cs / frameW * 2, 1, cs / barD * 0.7],
  [0, -frameH / 2 + barW / 2, 0], [0, 0, 0], [1, 1, 1]);

// Left bar
addPiece(bevelBox(barW, frameH - barW * 2, barD, 0.08), navy,
  [-cs * 0.4, 0, 0], [0, 0, Math.PI / 2], [0.8, cs / (frameH - barW * 2), cs / barD * 0.5],
  [-cs * 1.5, 0, 0.2], [0, 0.2, Math.PI / 4], [0.9, cs / (frameH - barW * 2) * 1.5, cs / barD * 0.7],
  [-frameW / 2 + barW / 2, 0, 0], [0, 0, 0], [1, 1, 1]);

// Right bar
addPiece(bevelBox(barW, frameH - barW * 2, barD, 0.08), navy,
  [cs * 0.4, 0, 0], [0, 0, -Math.PI / 2], [0.8, cs / (frameH - barW * 2), cs / barD * 0.5],
  [cs * 1.5, 0, 0.2], [0, -0.2, -Math.PI / 4], [0.9, cs / (frameH - barW * 2) * 1.5, cs / barD * 0.7],
  [frameW / 2 - barW / 2, 0, 0], [0, 0, 0], [1, 1, 1]);

// Back panel
addPiece(bevelBox(frameW - barW * 2, frameH - barW * 2, 0.1, 0.04), gunmetal,
  [0, 0, cs * 0.4], [0, Math.PI, 0], [cs / (frameW - barW * 2), cs / (frameH - barW * 2), 0.8],
  [0, 0, 0], [0, Math.PI / 2, 0], [cs / (frameW - barW * 2) * 1.5, cs / (frameH - barW * 2) * 1.5, 1],
  [0, 0, -barD * 0.5], [0, 0, 0], [1, 1, 1]);

// Front face (hidden in assembled state)
const frontGeo = bevelBox(cs, cs, 0.06, 0.04);
const frontMat = gunmetal.clone(); frontMat.transparent = true; frontMat.opacity = 0;
const frontFace = new THREE.Mesh(frontGeo, frontMat);
frontFace.position.set(0, 0, cs * 0.4);
frontFace.visible = false;
scene.add(frontFace);

// Greeble strips
addGreebleStrip(scene, 0, frameH / 2 - barW / 2, barD / 2 + 0.03, frameW * 0.6, false, greebMat);
addGreebleStrip(scene, 0, -frameH / 2 + barW / 2, barD / 2 + 0.03, frameW * 0.6, false, greebMat);

const ambientLight = new THREE.AmbientLight(0x555566, 0.01);

const sceneLights = {};
const lightHelpers = {};

function createLight(key, cfg) {
  if (sceneLights[key]) {
    scene.remove(sceneLights[key]);
    if (sceneLights[key].target) scene.remove(sceneLights[key].target);
  }
  if (lightHelpers[key]) {
    scene.remove(lightHelpers[key]);
    if (lightHelpers[key].dispose) lightHelpers[key].dispose();
    lightHelpers[key] = null;
  }

  const color = new THREE.Color(cfg.color);
  let light, helper;

  if (cfg.type === 'Directional') {
    light = new THREE.DirectionalLight(color, cfg.intensity);
    helper = new THREE.DirectionalLightHelper(light, 0.5);
  } else if (cfg.type === 'Point') {
    light = new THREE.PointLight(color, cfg.intensity, 30);
    helper = new THREE.PointLightHelper(light, 0.3);
  } else if (cfg.type === 'Spot') {
    light = new THREE.SpotLight(color, cfg.intensity, 30, cfg.angle || 0.52, cfg.penumbra || 0.5);
    helper = new THREE.SpotLightHelper(light);
  }

  light.position.set(cfg.x, cfg.y, cfg.z);
  light.userData.lightKey = key;
  scene.add(light);

  const showHelpers = document.getElementById('chk-helpers')?.checked;
  if (helper) {
    helper.visible = !!showHelpers;
    scene.add(helper);
  }

  sceneLights[key] = light;
  lightHelpers[key] = helper;
  return light;
}

for (const [k, v] of Object.entries(state.lights)) {
  createLight(k, v);
}

function setCubeState() {
  pieces.forEach(({ mesh, start }) => {
    mesh.position.set(start.p[0], start.p[1], start.p[2]);
    mesh.rotation.set(start.r[0], start.r[1], start.r[2]);
    mesh.scale.set(start.s[0], start.s[1], start.s[2]);
  });
  frontFace.visible = true;
  frontMat.opacity = 1;
  brackets.forEach(({ mesh, sx, sy, sRz }) => {
    mesh.position.set(sx, sy, cs * 0.4 + 0.05);
    mesh.rotation.z = sRz;
  });
  bolts.forEach(({ mesh, sx, sy }) => {
    mesh.position.set(sx, sy, cs * 0.4 + 0.12);
    mesh.rotation.z = 0;
  });
  gears.forEach(({ mesh }) => mesh.scale.set(0, 0, 0));
  pistons.forEach(({ mesh }) => mesh.scale.set(0, 0, 0));
  glows.forEach(g => { g.material.opacity = 0; });
  orangeStrips.forEach(g => { g.material.opacity = 0; });
}

function killAnimation() {
  if (activeTl) { activeTl.kill(); activeTl = null; }
  glowPulseTweens.forEach(t => t.kill());
  glowPulseTweens = [];
  glows.forEach(g => gsap.killTweensOf(g.material));
  orangeStrips.forEach(g => gsap.killTweensOf(g.material));
  isAnimating = false;
}

function playAnimation() {
  killAnimation();
  isAnimating = true;
  setCubeState();
  camera.position.set(0, 0, 9);

  const camZ = 9;
  const tl = gsap.timeline({
    onComplete: () => {
      glows.forEach(g => {
        const t = gsap.to(g.material, { opacity: state.glow.pulseMin, duration: state.glow.pulseSpeed, yoyo: true, repeat: -1, ease: 'sine.inOut' });
        glowPulseTweens.push(t);
      });
      orangeStrips.forEach(g => {
        const t = gsap.to(g.material, { opacity: 0.2, duration: 2.2, yoyo: true, repeat: -1, ease: 'sine.inOut' });
        glowPulseTweens.push(t);
      });
      isAnimating = false;
    }
  });
  activeTl = tl;

  // Front face dissolves
  tl.to(frontMat, { opacity: 0, duration: 0.3, ease: 'power2.in', onComplete: () => { frontFace.visible = false; } }, 0.2);

  // Pieces detach to mid
  pieces.forEach(({ mesh, mid }, i) => {
    const d = 0.3 + i * 0.05;
    tl.to(mesh.position, { x: mid.p[0], y: mid.p[1], z: mid.p[2], duration: 0.4, ease: 'power2.out' }, d);
    tl.to(mesh.rotation, { x: mid.r[0], y: mid.r[1], z: mid.r[2], duration: 0.4, ease: 'power2.out' }, d);
    tl.to(mesh.scale, { x: mid.s[0], y: mid.s[1], z: mid.s[2], duration: 0.4, ease: 'power2.out' }, d);
  });

  // Pieces to final
  pieces.forEach(({ mesh, end }, i) => {
    const d = 0.6 + i * 0.05;
    tl.to(mesh.position, { x: end.p[0], y: end.p[1], z: end.p[2], duration: 0.5, ease: 'power3.inOut' }, d);
    tl.to(mesh.rotation, { x: end.r[0], y: end.r[1], z: end.r[2], duration: 0.5, ease: 'power3.inOut' }, d);
    tl.to(mesh.scale, { x: end.s[0], y: end.s[1], z: end.s[2], duration: 0.5, ease: 'power3.inOut' }, d);
  });

  // Camera pulls back
  tl.to(camera.position, { z: camZ + 2.5, duration: 1.3, ease: 'power2.out' }, 0.2);

  // Gears appear
  gears.forEach(({ mesh }, i) => {
    tl.to(mesh.scale, { x: 1, y: 1, z: 1, duration: 0.3, ease: 'back.out(2.5)' }, 0.7 + i * 0.05);
  });

  // Brackets snap
  brackets.forEach(({ mesh, ex, ey }, i) => {
    tl.to(mesh.position, { x: ex, y: ey, z: barD / 2, duration: 0.4, ease: 'back.out(1.5)' }, 0.75 + i * 0.04);
    tl.to(mesh.rotation, { z: 0, duration: 0.4, ease: 'power3.out' }, 0.75 + i * 0.04);
  });

  // Bolts spin
  bolts.forEach(({ mesh, ex, ey }, i) => {
    tl.to(mesh.position, { x: ex, y: ey, z: barD / 2 + 0.12, duration: 0.4, ease: 'back.out(1.3)' }, 0.8 + i * 0.02);
    tl.to(mesh.rotation, { z: Math.PI * 5, duration: 0.4, ease: 'power2.out' }, 0.8 + i * 0.02);
  });

  // Pistons pop
  pistons.forEach(({ mesh }, i) => {
    tl.to(mesh.scale, { x: 1, y: 1, z: 1, duration: 0.25, ease: 'back.out(2)' }, 0.9 + i * 0.06);
  });

  // Glows
  glows.forEach((g, i) => {
    tl.to(g.material, { opacity: state.glow.ledOpacity, duration: 0.15, ease: 'power2.out' }, 0.95 + i * 0.04);
  });
  orangeStrips.forEach((g, i) => {
    tl.to(g.material, { opacity: state.glow.orangeOpacity, duration: 0.15, ease: 'power2.out' }, 1.0 + i * 0.03);
  });
}

document.getElementById('btn-play').addEventListener('click', playAnimation);
document.getElementById('btn-reset').addEventListener('click', () => {
  killAnimation();
  setAssembledState();
  camera.position.set(0, 0, 9);
});

// ============================
// GEOMETRY (prompt-only)
// ============================
for (const [id, key] of [['num-cs','cs'],['num-fw','fw'],['num-fh','fh'],['num-bw','bw'],['num-bd','bd'],['num-bevel','bevel']]) {
  document.getElementById(id).addEventListener('input', (e) => {
    state.geometry[key] = parseFloat(e.target.value) || 0;
    updatePrompt();
  });
}

// ============================
// PROMPT OUTPUT
// ============================
function hex6(c) {
  return '0x' + new THREE.Color(c).getHexString();
}

function updatePrompt() {
  const lines = ['Update TransformPlayer.jsx with these values:\n'];
  const D = DEFAULTS;

  for (const [name, cfg] of Object.entries(state.materials)) {
    const d = D.materials[name];
    if (cfg.color !== d.color) lines.push(`${name}.color = ${hex6(cfg.color)}`);
    if (cfg.metalness !== d.metalness) lines.push(`${name}.metalness = ${cfg.metalness.toFixed(2)}`);
    if (cfg.roughness !== d.roughness) lines.push(`${name}.roughness = ${cfg.roughness.toFixed(2)}`);
    if (cfg.clearcoat !== d.clearcoat) lines.push(`${name}.clearcoat = ${cfg.clearcoat.toFixed(2)}`);
    if (cfg.normalStrength !== d.normalStrength) lines.push(`${name}.normalScale = new THREE.Vector2(${cfg.normalStrength.toFixed(1)}, ${cfg.normalStrength.toFixed(1)})`);
    if (cfg.tilingX !== d.tilingX || cfg.tilingY !== d.tilingY) lines.push(`${name} texture tiling = (${cfg.tilingX.toFixed(1)}, ${cfg.tilingY.toFixed(1)})`);
  }

  const lightJSNames = { key: 'keyDir', fill: 'fillDir', rim: 'rimDir', orb1: 'orb1', orb2: 'orb2' };
  for (const [k, cfg] of Object.entries(state.lights)) {
    const d = D.lights[k];
    const n = lightJSNames[k];
    if (cfg.type !== d.type) lines.push(`${n}: change to ${cfg.type}Light`);
    if (cfg.color !== d.color) lines.push(`${n}.color = ${hex6(cfg.color)}`);
    if (cfg.intensity !== d.intensity) lines.push(`${n}.intensity = ${cfg.intensity.toFixed(1)}`);
    if (cfg.x !== d.x || cfg.y !== d.y || cfg.z !== d.z) lines.push(`${n}.position.set(${cfg.x.toFixed(1)}, ${cfg.y.toFixed(1)}, ${cfg.z.toFixed(1)})`);
    if (cfg.type === 'Spot') {
      if ((cfg.angle || 0) !== (d.angle || 0)) lines.push(`${n}.angle = ${(cfg.angle || 0).toFixed(2)}`);
      if ((cfg.penumbra || 0) !== (d.penumbra || 0)) lines.push(`${n}.penumbra = ${(cfg.penumbra || 0).toFixed(2)}`);
    }
  }

  if (state.exposure !== D.exposure) lines.push(`renderer.toneMappingExposure = ${state.exposure.toFixed(2)}`);
  if (state.background !== D.background) lines.push(`scene.background = new THREE.Color(${hex6(state.background)})`);
  if (state.fov !== D.fov) lines.push(`camera FOV = ${state.fov}`);

  if (state.glow.ledColor !== D.glow.ledColor) lines.push(`ledGlow.color = ${hex6(state.glow.ledColor)}`);
  if (state.glow.ledOpacity !== D.glow.ledOpacity) lines.push(`ledGlow final opacity = ${state.glow.ledOpacity.toFixed(1)}`);
  if (state.glow.orangeColor !== D.glow.orangeColor) lines.push(`orangeGlow.color = ${hex6(state.glow.orangeColor)}`);
  if (state.glow.orangeOpacity !== D.glow.orangeOpacity) lines.push(`orangeGlow final opacity = ${state.glow.orangeOpacity.toFixed(1)}`);
  if (state.glow.pulseSpeed !== D.glow.pulseSpeed) lines.push(`glow pulse speed = ${state.glow.pulseSpeed.toFixed(1)}`);
  if (state.glow.pulseMin !== D.glow.pulseMin) lines.push(`glow pulse min opacity = ${state.glow.pulseMin.toFixed(2)}`);
  if (state.glow.pulseMax !== D.glow.pulseMax) lines.push(`glow pulse max opacity = ${state.glow.pulseMax.toFixed(2)}`);

  const gd = D.geometry;
  if (state.geometry.cs !== gd.cs) lines.push(`cube size (cs) = ${state.geometry.cs}`);
  if (state.geometry.fw !== gd.fw) lines.push(`frameW = ${state.geometry.fw}`);
  if (state.geometry.fh !== gd.fh) lines.push(`frameH = ${state.geometry.fh}`);
  if (state.geometry.bw !== gd.bw) lines.push(`barW = ${state.geometry.bw}`);
  if (state.geometry.bd !== gd.bd) lines.push(`barD = ${state.geometry.bd}`);
  if (state.geometry.bevel !== gd.bevel) lines.push(`bevel = ${state.geometry.bevel}`);

  const output = lines.length > 1 ? lines.join('\n') : 'No changes from defaults.';
  document.getElementById('prompt-output').textContent = output;
}

document.getElementById('copy-btn').addEventListener('click', () => {
  const text = document.getElementById('prompt-output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  });
});

updatePrompt();

// ============================
// RENDER LOOP
// ============================
let time = 0;
let frameCount = 0;
let lastFpsTime = performance.now();
const fpsEl = document.getElementById('fps');

function animate() {
  requestAnimationFrame(animate);
  time += 0.016;

  orbitControls.update();

  // Gears spin
  gears.forEach(({ mesh, speed }) => { mesh.rotation.z += speed * 0.016; });
  // Pistons bob
  pistons.forEach(({ mesh, baseY }, i) => { mesh.position.y = baseY + Math.sin(time * 1.8 + i * Math.PI) * 0.15; });

  // Update helpers each frame
  for (const h of Object.values(lightHelpers)) {
    if (h && h.visible && h.update) h.update();
  }

  renderer.render(scene, camera);

  // FPS counter
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 500) {
    const fps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
    fpsEl.textContent = fps + ' FPS';
    frameCount = 0;
    lastFpsTime = now;
  }
}
animate();

// ============================
// RESIZE
// ============================
window.addEventListener('resize', () => {
  W = viewportEl.clientWidth;
  H = viewportEl.clientHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

// Keyboard shortcuts
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') transformControls.detach();
  if (e.key === 'w') transformControls.setMode('translate');
  if (e.key === 'e') transformControls.setMode('rotate');
  if (e.key === 'r') transformControls.setMode('scale');
});
</script>
